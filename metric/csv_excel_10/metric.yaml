    def report_content_accuracy(ground_truth):
        import pandas as pd
        
        # Load the evaluation report (assuming there's a 'Report' column)
        evaluation_report = pd.read_csv("evaluation_results.csv")
        
        # Load the ground truth (assuming it contains a column with key phrases)
        gt_report = pd.read_csv(ground_truth)
        
        # Check if the header of evaluation_report is a subset of the ground truth header
        eval_report_columns = set(evaluation_report.columns)
        gt_report_columns = set(gt_report.columns)
        
        return bool(eval_report_columns.issubset(gt_report_columns))
