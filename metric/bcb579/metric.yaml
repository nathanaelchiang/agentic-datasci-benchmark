ground_truth: "import unicodedata\nimport csv\nfrom collections import Counter\nimport\
  \ matplotlib.pyplot as plt\n\ndef normalize_text(text):\n    # Normalize the text\
  \ to ASCII\n    return unicodedata.normalize('NFKD', text).encode('ascii', 'ignore').decode('utf-8')\n\
  \ndef task_func(csv_file):\n    try:\n        with open(csv_file, mode='r', encoding='utf-8')\
  \ as file:\n            reader = csv.reader(file)\n            words = []\n    \
  \        for row in reader:\n                for cell in row:\n                \
  \    normalized = normalize_text(cell)\n                    words.extend(normalized.split())\n\
  \    except FileNotFoundError:\n        raise FileNotFoundError(f\"The file {csv_file}\
  \ cannot be found.\")\n    except IOError as e:\n        raise IOError(f\"An error\
  \ occurred reading the file {csv_file}: {e}\")\n\n    # Count the words\n    word_counts\
  \ = Counter(words)\n\n    # Get the 10 most common words\n    common_words = word_counts.most_common(10)\n\
  \n    # Prepare the data for plotting\n    labels, values = zip(*common_words)\n\
  \n    # Create a bar plot\n    fig, ax = plt.subplots()\n    ax.bar(labels, values)\n\
  \    ax.set_ylabel('Frequency')\n    ax.set_title('10 Most Common Words')\n\n  \
  \  return ax, common_words"
