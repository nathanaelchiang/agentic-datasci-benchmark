    def analysis_completeness(ground_truth):
        with open(ground_truth, 'r') as file:
            gt_analysis = file.read()
        with open("data_analysis.txt", 'r') as file:
            analysis = file.read()
        # Compare the content of the analysis with the ground truth
        return bool((len(set(analysis.split()).intersection(gt_analysis.split())) / len(set(gt_analysis.split()))) > 0.5)
