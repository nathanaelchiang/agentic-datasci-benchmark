    def outlier_removal_rate(ground_truth):
        import pandas as pd
        output = pd.read_csv("filtered_train.csv")
        # Assume ground truth contains the original number of samples
        gt_count = len(pd.read_csv(ground_truth))
        filtered_count = len(output)
        return bool(((gt_count - filtered_count) / gt_count) < 0.05)
