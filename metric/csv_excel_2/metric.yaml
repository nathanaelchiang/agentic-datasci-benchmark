    def spectral_image_clarity(ground_truth):
        import pandas as pd
        import numpy as np
        output = pd.read_csv("spectral_images_train.csv")
        gt_output = pd.read_csv(ground_truth)
        # Measure the variance in spectral images; higher variance indicates clarity
        gt_variance = np.var(gt_output.values)
        clarity_score = np.var(output.values)
        return bool(clarity_score <= gt_variance)
  "function": |-
    Data Validity
  "metric": |-
    Spectral Image Clarity
