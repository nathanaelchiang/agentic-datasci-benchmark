    def model_accuracy(ground_truth):
        import os
        import pandas as pd
        ground_truth_dir = os.path.join(ground_truth, "../test.csv")
        gt_output = pd.read_csv(ground_truth_dir)['label'].tolist()
        from sklearn.metrics import accuracy_score

        pred_dir = os.path.join(ground_truth, "model_evaluation_results.csv")
        pred_output = pd.read_csv(pred_dir)
        gt_pred = pred_output[pred_output.keys()[-1]].tolist()

        output = pd.read_csv("model_evaluation_results.csv")
        predictions = output[output.keys()[-1]].tolist()
        acc = accuracy_score(gt_output, predictions)

        gt_acc = accuracy_score(gt_output, gt_pred)
        return bool(acc >= gt_acc)
  "function": |-
    Model Accuracy
