    def frequent_itemsets_validity(ground_truth):
        import pandas as pd
        output = pd.read_csv("frequent_itemsets.csv")
        output_itemsets = set(output['itemsets'].tolist())

        output_gt = pd.read_csv(ground_truth)
        output_gt_itemsets = set(output_gt['itemsets'].tolist())

        valid_itemset_count = len(output_itemsets.intersection(output_gt_itemsets))
        total_itemsets = len(output_itemsets)
        return (valid_itemset_count / total_itemsets if total_itemsets > 0 else 0) >= 0.9
