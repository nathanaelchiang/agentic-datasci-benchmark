    def association_rules_validity(ground_truth):
        import pandas as pd
        output = pd.read_csv("association_rules.csv")
        output_rules = set(list(zip(output['antecedents'].tolist(),output['consequents'].tolist())))

        output_gt = pd.read_csv(ground_truth)
        output_gt_rules = set(list(zip(output_gt['antecedents'].tolist(),output_gt['consequents'].tolist())))

        valid_rule_count = len(output_rules.intersection(output_gt_rules))
        total_rules = len(output_rules)
        return (valid_rule_count / total_rules if total_rules > 0 else 0) >= 0.9
