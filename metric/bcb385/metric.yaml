ground_truth: "import matplotlib.pyplot as plt\nfrom collections import Counter\n\n\
  FRUITS = ['Apple', 'Banana', 'Cherry', 'Date', 'Elderberry', 'Fig', 'Grape', 'Honeydew',\
  \ 'Indian Prune', 'Jackfruit']\n\ndef task_func(fruit_dict):\n    # Count the occurrences\
  \ of each fruit\n    counts_dict = Counter()\n    for fruit in fruit_dict.values():\n\
  \        if fruit in FRUITS:\n            counts_dict[fruit] += 1\n\n    # Prepare\
  \ data for plotting\n    fruit_names = list(counts_dict.keys())\n    fruit_counts\
  \ = list(counts_dict.values())\n    \n    # Create bar chart\n    fig, ax = plt.subplots()\n\
  \    ax.bar(fruit_names, fruit_counts, color='skyblue')\n    ax.set_title('Favorite\
  \ Fruits Count')\n    ax.set_xlabel('Fruits')\n    ax.set_ylabel('Counts')\n   \
  \ plt.xticks(rotation=45)\n    \n    # Return the counts dictionary and the axes\
  \ object\n    return counts_dict, ax"
