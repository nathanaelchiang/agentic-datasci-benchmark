    def filter_efficiency(ground_truth):  
        import pandas as pd  
        output = pd.read_excel("target.xlsx", sheet_name='sheet1')
        gt_output = pd.read_excel(ground_truth, sheet_name='sheet1')
        gt_rows = gt_output['G'].dropna().tolist()
        filtered_rows = output['G'].dropna().tolist()
        return bool(filtered_rows == gt_rows)
