    def descriptive_statistics_verification(ground_truth):  
        import pandas as pd  
        output = pd.read_excel("target.xlsx", sheet_name='sheet1')
        gt_output = pd.read_excel(ground_truth, sheet_name='sheet1')
        stats_ground_truth = gt_output['G'].describe()
        stats_output = output['G'].describe()
        return stats_ground_truth.equals(stats_output)
