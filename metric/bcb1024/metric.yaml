  \ndef task_func(data_dict):\n    # Create DataFrame from the input dictionary, excluding\
  \ None values\n    df = pd.DataFrame(data_dict).dropna()\n    \n    # Check if the\
  \ DataFrame is empty\n    if df.empty:\n        return df, None\n    \n    # Get\
