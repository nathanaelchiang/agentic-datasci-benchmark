ground_truth: "import pandas as pd\nimport matplotlib.pyplot as plt\nfrom sklearn.preprocessing\
  \ import MinMaxScaler\n\ndef task_func(df):\n    if not isinstance(df, pd.DataFrame)\
  \ or df.empty:\n        raise ValueError(\"Input must be a non-empty pandas DataFrame.\"\
  )\n    \n    # Normalize the last column\n    scaler = MinMaxScaler()\n    last_column_name\
  \ = df.columns[-1]\n    normalized_values = scaler.fit_transform(df[[last_column_name]])\n\
  \    normalized_df = df.copy()\n    normalized_df[last_column_name] = normalized_values\n\
  \    \n    # Plot the normalized last column\n    fig, plot_axes = plt.subplots()\n\
  \    plot_axes.plot(normalized_df.index, normalized_df[last_column_name])\n    plot_axes.set_title(f'Normalized\
  \ Data of {last_column_name}')\n    plot_axes.set_xlabel('Index')\n    plot_axes.set_ylabel('Normalized\
  \ Value')\n    \n    plt.show()  # Show the plot\n    return normalized_df, plot_axes"
prompt: "Normalize the last column of the DataFrame using MinMaxScaler from sklearn\
  \ and plot the normalized data. The function should raise the exception for: ValueError:\
  \ If the input is not a DataFrame or if the DataFrame is empty. The function should\
  \ output with: tuple(normalized_df: pandas.DataFrame, plot_axes: matplotlib.axes.Axes)\n\
  normalized_df: A pandas DataFrame where the last column has been normalized. \n\
  plot_axes: A Matplotlib Axes object representing the plot of the normalized last\
  \ column. The plot includes: \nTitle: 'Normalized Data of <column_name>' \nX-axis\
  \ label: 'Index' \nY-axis label: 'Normalized Value' \nYou should write self-contained\
  \ code starting with:\n```\nimport pandas as pd\nimport matplotlib.pyplot as plt\n\
  from sklearn.preprocessing import MinMaxScaler\ndef task_func(df):\n```"
