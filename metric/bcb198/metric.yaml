  \ as plt\n\ndef task_func(data, value):\n    if not data:\n        return (np.array([]),\
  \ 0)\n    \n    average = statistics.mean(data)\n    greater_than_avg = np.array(sorted([x\
  \ for x in data if x > average]))\n    count_greater_than_value = sum(1 for x in\
  \ data if x > value)\n    \n    plt.hist(greater_than_avg, bins='auto', alpha=0.7,\
  \ rwidth=0.85)\n    plt.title('Histogram of Values Greater Than Average')\n    plt.xlabel('Values')\n\
  \    plt.ylabel('Frequency')\n    plt.grid(True)\n    plt.show()\n    \n    return\
  \ (greater_than_avg, count_greater_than_value)"
