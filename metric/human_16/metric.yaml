    def clustering_quality(ground_truth):
        from sklearn.metrics import silhouette_score
        import pandas as pd
        import numpy as np

        output = pd.read_csv('clusters.csv')
        labels = output['Cluster'].tolist()
        X = np.load('X.npy')

        output_gt = pd.read_csv(ground_truth)
        labels_gt = output_gt['Cluster'].tolist()

        return silhouette_score(X, labels) >= silhouette_score(X, labels_gt)
  "function": |-
    Silhouette Score
  "ground_truth": |-
    clusters.csv
  "metric": |-
    Clustering Quality (Silhouette Score)
