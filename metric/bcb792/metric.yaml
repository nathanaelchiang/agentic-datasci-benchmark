ground_truth: "import pandas as pd\nimport heapq\nfrom sklearn.linear_model import\
  \ LinearRegression\n\ndef task_func(df, feature, target, n=10):\n    if feature\
  \ not in df.columns or target not in df.columns:\n        raise ValueError(\"Specified\
  \ columns are not in the provided DataFrame.\")\n    \n    X = df[[feature]].values\n\
  \    y = df[target].values\n    \n    model = LinearRegression()\n    model.fit(X,\
  \ y)\n    \n    predictions = model.predict(X)\n    residuals = y - predictions\n\
  \    \n    # Get the indices of the n largest residuals\n    largest_residuals_indices\
  \ = heapq.nlargest(n, range(len(residuals)), key=lambda i: abs(residuals[i]))\n\
  \    \n    return (largest_residuals_indices, model)"
