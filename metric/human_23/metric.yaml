    def min_max_scaling_range(ground_truth):
        import pandas as pd
        output = pd.read_csv("normalized_data.csv")
        min_vals = output[['Temperature', 'Humidity', 'WindSpeed']].min()
        max_vals = output[['Temperature', 'Humidity', 'WindSpeed']].max()
        pre_output = (max_vals - min_vals).sum()
        gt = pd.read_csv("normalized_data.csv")
        pre_gt = (gt[['Temperature', 'Humidity', 'WindSpeed']].max() - gt[['Temperature', 'Humidity', 'WindSpeed']].min()).sum()
        return bool(pre_output == pre_gt)
  "function": |-
    Normalization Range Check
