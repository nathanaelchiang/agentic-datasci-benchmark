    def one_hot_encoding_consistency(ground_truth):
        import pandas as pd
        output = pd.read_csv("final_cleaned_data.csv")
        gt = pd.read_csv(ground_truth)
        unique_station_ids = gt['StationID_StationA'].unique()
        return bool(all(station_id in output['StationID_StationA'].unique() for station_id in unique_station_ids))
  "function": |-
    Data Quality Score
  "metric": |-
    One-Hot Encoding Consistency Check
