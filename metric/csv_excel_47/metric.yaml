    def classification_accuracy(ground_truth):
        from sklearn.metrics import accuracy_score
        import pandas as pd
        output = pd.read_csv("classification_results.csv")
        gt_output = pd.read_csv(ground_truth)
        gt_acc = accuracy_score(gt_output['True Species Code'], gt_output['Predicted Species Code'])
        acc = accuracy_score(output['True Species Code'], output['Predicted Species Code'])
        # predictions = output['Predictions'].tolist()
        # return accuracy_score(ground_truth, predictions)
        return bool(acc >= gt_acc)
