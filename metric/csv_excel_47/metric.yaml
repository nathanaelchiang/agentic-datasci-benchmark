    def sample_counts(ground_truth):
        import pandas as pd
        output = pd.read_csv("sample_counts.csv")
        gt_output = pd.read_csv(ground_truth)
        training_samples = output['Sample Count'].iloc[0]
        test_samples = output['Sample Count'].iloc[1]
        gt_training_samples = gt_output['Sample Count'].iloc[0]
        gt_test_samples = gt_output['Sample Count'].iloc[1]
        # expected_training_samples, expected_test_samples = gt_output
        return bool((training_samples == gt_training_samples) and (test_samples == gt_test_samples))
