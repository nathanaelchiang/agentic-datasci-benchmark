ground_truth: "import pandas as pd\nimport seaborn as sns\nimport matplotlib.pyplot\
  \ as plt\n\ndef task_func(data, column='c'):\n    # Convert the input dictionary\
  \ to a DataFrame\n    df = pd.DataFrame(data)\n    \n    # Remove the specified\
  \ column\n    if column in df.columns:\n        df = df.drop(columns=[column])\n\
  \    \n    # Select only the numeric columns\n    numeric_df = df.select_dtypes(include=['number'])\n\
  \    \n    # Check if there's any numeric data to work with\n    if numeric_df.empty:\n\
  \        return (None,)\n    \n    # Compute the correlation matrix\n    correlation_matrix\
  \ = numeric_df.corr()\n    \n    # Create a heatmap\n    plt.figure(figsize=(10,\
  \ 8))\n    heatmap_axes = sns.heatmap(correlation_matrix, annot=True, fmt=\".2f\"\
  , cmap='coolwarm', square=True)\n    \n    # Show the heatmap\n    plt.show()\n\
  \    \n    return (heatmap_axes,)"
