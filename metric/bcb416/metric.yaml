  correlation matrix of the remaining data. Non-numeric columns are excluded from
  the heatmap. If the data is empty or has no numeric columns, the function returns
  None. The function should output with: tuple(heatmap_axes: matplotlib.axes._axes.Axes
  or None) heatmap_axes: The Axes object of the heatmap or None if the heatmap is
  not generated. You should write self-contained code starting with: ``` import pandas
  as pd import seaborn as sns def task_func(data, column=''c''): ```"'
