ground_truth: "import pandas as pd\nimport numpy as np\nfrom sklearn.decomposition\
  \ import PCA\nimport seaborn as sns\nimport matplotlib.pyplot as plt\n\ndef task_func(df:\
  \ pd.DataFrame):\n    # Exclude non-numeric columns\n    numeric_df = df.select_dtypes(include=[np.number])\n\
  \    \n    # Replace missing values with the column's average\n    numeric_df.fillna(numeric_df.mean(),\
  \ inplace=True)\n\n    # Perform PCA\n    pca = PCA(n_components=2)\n    components\
  \ = pca.fit_transform(numeric_df)\n\n    # Create a new DataFrame for the principal\
  \ components\n    pca_df = pd.DataFrame(data=components, columns=['Component 1',\
  \ 'Component 2'])\n\n    # Create a scatter plot\n    fig, scatter_ax = plt.subplots()\n\
  \    scatter_ax.scatter(pca_df['Component 1'], pca_df['Component 2'])\n    scatter_ax.set_xlabel('Component\
  \ 1')\n    scatter_ax.set_ylabel('Component 2')\n    scatter_ax.set_title('PCA of\
  \ DataFrame')\n\n    plt.show()\n\n    return (pca_df, scatter_ax)"
