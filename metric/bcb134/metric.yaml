testcase: "import unittest\nimport pandas as pd\nimport numpy as np\nimport matplotlib.pyplot\
  \ as plt\n\nclass TestCases(unittest.TestCase):\n    def setUp(self):\n        np.random.seed(42)\n\
  \n    def test_return_type(self):\n        df = pd.DataFrame(np.random.randint(0,\
  \ 100, size=(100, 4)), columns=list('ABCD'))\n        ax = task_func(df)\n     \
  \   self.assertIsInstance(ax, plt.Axes)\n\n    def test_invalid_input_empty_dataframe(self):\n\
  \        with self.assertRaises(ValueError):\n            task_func(pd.DataFrame())\n\
  \n    def test_invalid_input_type(self):\n        with self.assertRaises(ValueError):\n\
  \            task_func(\"not a dataframe\")\n\n    def test_histogram_bins(self):\n\
  \        df = pd.DataFrame(np.random.randint(0, 100, size=(100, 4)), columns=list('ABCD'))\n\
  \        ax = task_func(df, bins=10)\n        # plt.hist returns a tuple; to check\
  \ the number of bins, we need to count the patches of the ax object\n        self.assertEqual(len(ax.patches),\
  \ 10)\n\n    def test_plot_title_and_labels(self):\n        df = pd.DataFrame(np.random.randint(0,\
  \ 100, size=(100, 4)), columns=list('ABCD'))\n        ax = task_func(df)\n     \
  \   self.assertIn('Histogram of ', ax.get_title())\n        self.assertEqual(ax.get_xlabel(),\
  \ 'Value')\n        self.assertEqual(ax.get_ylabel(), 'Frequency')\n\n    def test_histogram_values(self):\n\
  \        # Create a DataFrame with fixed values to ensure predictable histogram\
  \ frequencies\n        df = pd.DataFrame({'A': [1] * 10 + [2] * 20 + [3] * 30})\n\
  \        ax = task_func(df, bins=3)  # Bins set to 3 to match the distinct values\
  \ in 'A'\n        n, bins, patches = ax.hist(df['A'], bins=3)\n        # Expected\
  \ frequencies: 10 for '1', 20 for '2', 30 for '3'\n        expected_frequencies\
  \ = [10, 20, 30]\n        actual_frequencies = [p.get_height() for p in patches]\n\
  \        self.assertEqual(actual_frequencies, expected_frequencies)"
