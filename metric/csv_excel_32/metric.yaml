    def average_accuracy(ground_truth):
        import pandas as pd
        output = pd.read_csv("accuracy_results.csv")
        gt_output = pd.read_csv(ground_truth)
        gt_acc = gt_output['Accuracy'].mean()
        return bool(output['Accuracy'].mean() >= gt_acc)
