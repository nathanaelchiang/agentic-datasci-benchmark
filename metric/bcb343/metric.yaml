ground_truth: "import pandas as pd\nimport matplotlib.pyplot as plt\n\n# Constants\
  \ for pie chart colors\nCOLORS = ['r', 'g', 'b', 'y', 'm']\n\ndef task_func(df,\
  \ col, title=None):\n    # Validate input\n    if not isinstance(df, pd.DataFrame):\n\
  \        raise ValueError(\"The input df must be DataFrame.\")\n    if df.empty:\n\
  \        raise ValueError(\"The DataFrame must not be empty.\")\n    if col not\
  \ in df.columns:\n        raise ValueError(f\"The specified column '{col}' must\
  \ be present in the DataFrame.\")\n\n    # Count unique values\n    unique_counts\
  \ = df[col].value_counts().to_dict()\n\n    # Plot pie chart\n    pie_axes = plt.figure().add_subplot(1,\
  \ 1, 1)\n    pie_axes.pie(unique_counts.values(), labels=unique_counts.keys(), colors=COLORS[:len(unique_counts)],\
  \ autopct='%1.1f%%')\n    if title:\n        pie_axes.set_title(title)\n\n    plt.show()\n\
  \    \n    return pie_axes, unique_counts"
