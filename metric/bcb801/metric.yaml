  \n    def tearDown(self):\n        # Remove the temporary directory after the test\n\
  \        shutil.rmtree(self.test_dir)\n\n    def create_csv(self, file_name, headers,\
  \ data):\n        # Helper function to create a CSV file\n        path = os.path.join(self.test_dir,\
  \ file_name)\n        with open(path, 'w', newline='') as csvfile:\n           \
  \ writer = csv.DictWriter(csvfile, fieldnames=headers)\n            writer.writeheader()\n\
  \            for row in data:\n                writer.writerow(row)\n        return\
  \ path\n\n    def test_empty_csv(self):\n        # Test for an empty CSV file\n\
  \        file_path = self.create_csv('empty.csv', ['Name', 'Age'], [])\n       \
  \ result = task_func(file_path)\n        self.assertEqual(result, {})\n\n    def\
  \ test_single_entry(self):\n        # Test for a CSV file with a single entry\n\
