ground_truth: "from sklearn.cluster import KMeans\nimport matplotlib.pyplot as plt\n\
  import pandas as pd\nimport numpy as np\n\ndef task_func(df1, df2, column1=\"feature1\"\
  , column2=\"feature2\"):\n    # Merging datasets\n    merged_df = pd.merge(df1,\
  \ df2, left_on='id', right_on='id')\n    \n    # Extracting the features for clustering\n\
  \    features = merged_df[[column1, column2]].values\n    \n    # Performing KMeans\
  \ clustering\n    kmeans = KMeans(n_clusters=2, n_init=10, random_state=42)\n  \
  \  labels = kmeans.fit_predict(features)\n    \n    # Creating the scatterplot\n\
  \    fig, ax = plt.subplots()\n    scatter = ax.scatter(merged_df[column1], merged_df[column2],\
  \ c=labels, cmap='viridis')\n    ax.set_xlabel(column1)\n    ax.set_ylabel(column2)\n\
  \    ax.set_title('KMeans Clustering')\n    plt.colorbar(scatter, ax=ax, label='Cluster')\n\
  \    \n    return labels.astype(np.int32), ax"
