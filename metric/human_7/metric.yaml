    def association_rule_coverage(ground_truth):
        import pandas as pd
        
        # Load the actual frequent itemsets
        output = pd.read_csv("frequent_itemsets.csv")
        output_itemsets = set(output['itemsets'])

        # Load ground truth frequent itemsets
        ground_truth_itemsets = set(pd.read_csv(ground_truth)['itemsets'])

        # Calculate coverage
        return len(output_itemsets.intersection(ground_truth_itemsets)) / len(ground_truth_itemsets) >= 0.9
