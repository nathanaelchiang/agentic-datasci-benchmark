    def clustering_result_consistency(ground_truth):
        import pandas as pd
        output = pd.read_csv("clustering_results.csv")
        gt_output = pd.read_csv(ground_truth).values.tolist()
        clusters = output.values.tolist()
        return all(len(cluster) == len(gt_output[i]) for i, cluster in enumerate(clusters))
