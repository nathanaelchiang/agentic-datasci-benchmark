ground_truth: "import pandas as pd\nimport matplotlib.pyplot as plt\nfrom sklearn.decomposition\
  \ import PCA\n\ndef task_func(data_matrix, n_components=2):\n    # Initialize PCA\n\
  \    pca = PCA(n_components=n_components)\n    \n    # Fit and transform the data\n\
  \    pca_transformed = pca.fit_transform(data_matrix)\n    \n    # Calculate the\
  \ mean value of each component\n    mean_values = pca_transformed.mean(axis=0)\n\
  \    \n    # Create a DataFrame with the PCA results\n    pca_df = pd.DataFrame(pca_transformed,\
  \ columns=[f'Component {i+1}' for i in range(n_components)])\n    \n    # Add a\
  \ column for the mean value of the components per row\n    pca_df['Mean'] = pca_df.mean(axis=1)\n\
  \    \n    # Calculate cumulative explained variance\n    cum_var = pca.explained_variance_ratio_.cumsum()\n\
  \    \n    # Plot cumulative explained variance\n    fig, ax = plt.subplots()\n\
  \    ax.plot(range(1, n_components + 1), cum_var, marker='o')\n    ax.set_xlabel('Number\
  \ of Components')\n    ax.set_ylabel('Cumulative Explained Variance')\n    ax.set_title('Cumulative\
  \ Explained Variance by PCA Components')\n    \n    # Return the DataFrame and the\
  \ plot\n    return pca_df, ax"
prompt: 'Apply PCA with n_components components to a 2D data matrix, calculate the
  mean value of each component, and then return the cumulative explained variance
  of the components in a plot. The function returns a dataframe with columns ''Component
  1'', ''Component 2'', ... etc. Each row of the dataframe corresponds to a row of
  the original matrix mapped in the PCA space. The dataframe should also include a
  column ''Mean'' which is the average value of each component value per row. Create
  a plot of the cumulative explained variance. The xlabel should be ''Number of Components''
  and the ylabel ''Cumulative Explained Variance''.


  The function should output with: tuple(pca_df: pandas.DataFrame, cum_var_plot: matplotlib.axes._axes.Axes)

  pca_df: A DataFrame containing the PCA transformed data and the mean of each component.

  cum_var_plot: A plot showing the cumulative explained variance of the components.


