- code: "def pr_curve_quality(output, ground_truth):\n    import numpy as np\n   \
    \ lines_output = output[1].get_lines()\n    if not lines_output:\n        return\
    \ 0  # If no lines, return the worst case scenario\n\n    precision_output, recall_output\
    \ = lines_output[0].get_data()\n\n    # Extract precision and recall data from\
    \ the ground_truth\n    lines_gt = ground_truth[1].get_lines()\n    if not lines_gt:\n\
    \        return 0  # If no lines, return the worst case scenario\n\n    precision_gt,\
    \ recall_gt = lines_gt[0].get_data()\n\n    # Ensure both precision-recall curves\
    \ have the same recall points for comparison\n    combined_recall = np.union1d(recall_output,\
    \ recall_gt)\n    precision_output_interpolated = np.interp(combined_recall, recall_output,\
    \ precision_output)\n    precision_gt_interpolated = np.interp(combined_recall,\
    \ recall_gt, precision_gt)\n\n    # Compute the area between the precision-recall\
    \ curves (for simplicity, use absolute difference)\n    area_between_curves =\
    \ np.trapz(np.abs(precision_output_interpolated - precision_gt_interpolated),\
    \ combined_recall)\n\n    # Compute the maximum possible area (area under a perfect\
    \ precision-recall curve)\n    max_possible_area = np.trapz(np.ones_like(combined_recall),\
    \ combined_recall)\n\n    # Convert the area between curves to a value between\
    \ 0 and 1\n    quality_score = 1 - (area_between_curves / max_possible_area)\n\
    \    \n    # Ensure the quality score is within the range [0, 1]\n    quality_score\
    \ = max(0, min(1, quality_score))\n    \n    return quality_score\n"
