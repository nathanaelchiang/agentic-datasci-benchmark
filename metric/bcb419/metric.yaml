ground_truth: "from sklearn.model_selection import train_test_split\nfrom sklearn.metrics\
  \ import precision_recall_curve\nfrom tensorflow import keras\nimport matplotlib.pyplot\
  \ as plt\n\ndef task_func(X, Y):\n    # Split the data into training (70%) and test\
  \ (30%) sets\n    X_train, X_test, y_train, y_test = train_test_split(X, Y, test_size=0.3,\
  \ random_state=42)\n\n    # Construct a Keras Sequential model\n    model = keras.Sequential()\n\
  \    model.add(keras.layers.Dense(10, activation='sigmoid', input_dim=X.shape[1]))\n\
  \    model.add(keras.layers.Dense(1, activation='sigmoid'))\n\n    # Compile the\
  \ model using binary cross-entropy loss and SGD optimizer\n    model.compile(loss='binary_crossentropy',\
  \ optimizer='sgd', metrics=['accuracy'])\n\n    # Fit the model to the training\
  \ data in a non-verbose mode\n    model.fit(X_train, y_train, epochs=100, batch_size=32,\
  \ verbose=0)\n\n    # Predict probabilities for the test set\n    y_scores = model.predict(X_test).ravel()\n\
  \n    # Calculate precision and recall\n    precision, recall, _ = precision_recall_curve(y_test,\
  \ y_scores)\n\n    # Plot the Precision-Recall curve\n    fig, ax = plt.subplots()\n\
  \    ax.plot(recall, precision, marker='.')\n    ax.set_xlabel('Recall')\n    ax.set_ylabel('Precision')\n\
  \    ax.set_title('Precision-Recall Curve')\n\n    # Return the trained model and\
  \ the axes object\n    return model, ax"
