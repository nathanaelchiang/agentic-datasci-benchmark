    def silhouette_score(ground_truth):
        from sklearn.metrics import silhouette_score
        import pandas as pd

        # Load the customer segments
        data = pd.read_csv("customer_segments.csv")
        X = data[['Annual Income (k$)', 'Spending Score (1-100)']]
        labels = data['Cluster']

        data_gt = pd.read_csv(ground_truth)
        X_gt = data[['Annual Income (k$)', 'Spending Score (1-100)']]
        labels_gt = data['Cluster'] 
        
        return silhouette_score(X, labels) >= silhouette_score(X_gt, labels_gt)
