  from sklearn.ensemble import RandomForestRegressor\nfrom sklearn.metrics import\
  \ mean_squared_error\n\ndef task_func(data, target, test_size=0.2, random_state=None):\n\
  \    # Convert input data to a pandas DataFrame\n    df = pd.DataFrame(data)\n\n\
  \    # Raise ValueError for empty DataFrame or missing target column\n    if df.empty:\n\
  \        raise ValueError(\"The input DataFrame is empty.\")\n    if target not\
  \ in df.columns:\n        raise ValueError(f\"The target column '{target}' is not\
  \ in the DataFrame.\")\n\n    # Split the data into features and target\n    X =\
  \ df.drop(columns=[target])\n    y = df[target]\n\n    # Split the data into training\
  \ and testing sets\n    X_train, X_test, y_train, y_test = train_test_split(X, y,\
  \ test_size=test_size, random_state=random_state)\n\n    # Initialize and train\
  \ the RandomForestRegressor model\n    model = RandomForestRegressor(random_state=random_state)\n\
  \    model.fit(X_train, y_train)\n\n    # Make predictions and calculate the mean\
  \ squared error\n    predictions = model.predict(X_test)\n    mse = mean_squared_error(y_test,\
  \ predictions)\n\n    return (mse, model, df)"
