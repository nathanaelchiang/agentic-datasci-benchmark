    def model_accuracy(ground_truth):
        from sklearn.metrics import accuracy_score
        import pandas as pd
        output = pd.read_csv("evaluation_results.csv")
        accuracy_row = output.loc[output['Metric'].str.lower().str.contains('accuracy')]
        acc = accuracy_row['Score'].values[0]
        gt_output = pd.read_csv(ground_truth)
        gt_acc_row = gt_output.loc[gt_output['Metric'].str.lower().str.contains('accuracy')]
        gt_acc = gt_acc_row['Score'].values[0]
        return bool(acc >= gt_acc)
