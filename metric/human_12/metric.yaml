    def silhouette_score(ground_truth):
        from sklearn.metrics import silhouette_score
        import pandas as pd
        from sklearn.cluster import KMeans

        output = pd.read_csv("clustering_results.csv")
        features = output.drop(['Cluster', 'income'], axis=1)[:1000]
        cluster_labels = output['Cluster'].tolist()[:1000]

        output_gt = pd.read_csv(ground_truth)
        features_gt = output_gt.drop(['Cluster', 'income'], axis=1)[:1000]
        cluster_labels_gt = output_gt['Cluster'].tolist()[:1000]

        return silhouette_score(features, cluster_labels) >= silhouette_score(features_gt, cluster_labels_gt)
  "function": |-
