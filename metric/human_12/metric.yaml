    def percentage_missing_values(ground_truth):
        import pandas as pd
        output = pd.read_csv("cleaned_data.csv")
        total_cells = output.size
        missing_cells = output.isnull().sum().sum()

        output_gt = pd.read_csv(ground_truth)
        total_cells_gt = output_gt.size
        missing_cells_gt = output_gt.isnull().sum().sum()
        return (missing_cells / total_cells) * 100 == (missing_cells_gt / total_cells_gt) * 100
  "function": |-
    Data Completeness
