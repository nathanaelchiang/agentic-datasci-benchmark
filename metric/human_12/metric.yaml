    def model_accuracy(ground_truth):
        from sklearn.metrics import accuracy_score
        import pandas as pd
        output = pd.read_csv("model_predictions.csv")
        predictions = output['Predicted'].tolist()
        labels = output['Actual'].tolist()

        output_gt = pd.read_csv(ground_truth)
        predictions_gt = output_gt['Predicted'].tolist()
        labels_gt = output_gt['Actual'].tolist()
        return accuracy_score(labels, predictions) >= accuracy_score(labels_gt, predictions_gt)
  "function": |-
