    \        return None  # \u5982\u679C\u6CA1\u6709\u6570\u636E\uFF0C\u76F4\u63A5\
    \u8FD4\u56DE None\n\n    qq_line = ax_qq_output.lines[0]  # \u83B7\u53D6 Q-Q \u56FE\
    \u7684\u7EBF\n    x_qq_output, y_qq_output = qq_line.get_data()  # \u63D0\u53D6\
    \ (x, y) \u6570\u636E\n\n    if len(x_qq_output) == 0 or len(y_qq_output) == 0:\n\
    \        return None  # \u5982\u679C\u6570\u636E\u4E3A\u7A7A\uFF0C\u8FD4\u56DE\
    \ None\n\n    # \u8BA1\u7B97 output \u7684 Q-Q \u56FE\u76F8\u5173\u7CFB\u6570\n\
    \    correlation_coefficient = np.corrcoef(x_qq_output, y_qq_output)[0, 1]\n\n\
    \    # \u63D0\u53D6 ground truth \u4E2D\u7684 Q-Q \u56FE\u6570\u636E\n    fig_ground_truth\
    \ = ground_truth[0]\n    ax_qq_ground_truth = fig_ground_truth.get_axes()[1]\n\
    \    if not ax_qq_ground_truth.lines:\n        return None  # \u5982\u679C\u6CA1\
    \u6709\u6570\u636E\uFF0C\u76F4\u63A5\u8FD4\u56DE None\n\n    qq_line_ground_truth\
    \ = ax_qq_ground_truth.lines[0]\n    x_qq_ground_truth, y_qq_ground_truth = qq_line_ground_truth.get_data()\n\
    \n    if len(x_qq_ground_truth) == 0 or len(y_qq_ground_truth) == 0:\n       \
    \ return None  # \u5982\u679C\u6570\u636E\u4E3A\u7A7A\uFF0C\u8FD4\u56DE None\n\
    \n    # \u8BA1\u7B97 ground truth \u7684 Q-Q \u56FE\u76F8\u5173\u7CFB\u6570\n\
    \    ground_truth_correlation = np.corrcoef(x_qq_ground_truth, y_qq_ground_truth)[0,\
    \ 1]\n\n    # \u8FD4\u56DE\u4E24\u8005\u76F8\u5173\u7CFB\u6570\u7684\u7EDD\u5BF9\
    \u5DEE\u503C\n    difference = np.abs(correlation_coefficient - ground_truth_correlation)\n\
    \n    # \u5C06\u5DEE\u503C\u8F6C\u6362\u4E3A [0,1] \u8303\u56F4\u5185\u7684\u6570\
    \u503C\uFF0C1 \u8868\u793A\u6700\u597D\u7684\u7ED3\u679C\n    score = 1 - difference\n\
