    def descriptive_statistics_accuracy(ground_truth):
        import pandas as pd
        gt_output = pd.read_csv(ground_truth)
        output = pd.read_csv("output.csv")
        actual_stats = output.describe()
        expected_stats = gt_output.describe()
        return bool((actual_stats == expected_stats).all().all())
  "function": |-
