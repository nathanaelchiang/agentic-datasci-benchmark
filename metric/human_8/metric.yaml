    def clustering_silhouette_score(ground_truth):
        import pandas as pd
        from sklearn.metrics import silhouette_score
        output = pd.read_csv("clusters.csv")
        features = output.iloc[:, :-1]
        labels = output.iloc[:, -1]
        ground_truth_df = pd.read_csv(ground_truth)
        ground_truth_features = ground_truth_df.iloc[:, :-1]
        ground_truth_labels = ground_truth_df.iloc[:, -1]
        return silhouette_score(features, labels) >= silhouette_score(ground_truth_features, ground_truth_labels)
  "function": |-
    Silhouette Score
  "metric": |-
    Clustering Silhouette Score
