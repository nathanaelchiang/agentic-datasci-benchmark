    def data_quality_score(ground_truth):
        import pandas as pd
        output = pd.read_csv("cleaned_data.csv")
        output_shape = output.shape
        duplicates = output.duplicated().sum()
        missing_values = output.isnull().sum().sum()

        output_gt = pd.read_csv(ground_truth)
        output_gt_shape = output_gt.shape
        output_gt_duplicates = output_gt.duplicated().sum()
        output_gt_missing_values = output_gt.isnull().sum().sum()

        return all([output_shape == output_gt_shape, duplicates == output_gt_duplicates, missing_values == output_gt_missing_values])
