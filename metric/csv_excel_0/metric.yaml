    def report_completeness_score(ground_truth):
        import pandas as pd
        gt_output = pd.read_csv(ground_truth)
        output = pd.read_csv("output.csv")
        
        required_fields = set(gt_output.columns[1:])  # Assuming ground truth contains the indicators
        actual_fields = set(output.columns[1:])  # Ignoring year
        completeness = required_fields.issubset(actual_fields)
        
        return completeness  # Returns True if all required fields are present
  "function": |-
    Report Completeness
