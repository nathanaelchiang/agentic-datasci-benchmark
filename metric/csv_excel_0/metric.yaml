    def data_completeness_ratio(ground_truth):
        import pandas as pd
        gt_output = pd.read_csv(ground_truth)
        output = pd.read_csv("output.csv")
        total_entries = gt_output.notnull().sum().sum()
        actual_entries = output.notnull().sum().sum()
        return bool(actual_entries == total_entries)
