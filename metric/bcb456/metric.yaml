  \ Value\" to indicate the range of data values. It returns both the normalized data\
  \ and the heatmap plot. The function should output with: tuple(normalized_data:\
  \ pd.DataFrame, heatmap_plot: plt.Axes)\nnormalized_data: The normalized DataFrame\
