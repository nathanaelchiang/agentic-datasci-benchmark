ground_truth: "import pandas as pd\nimport matplotlib.pyplot as plt\nimport seaborn\
  \ as sns\nfrom sklearn.preprocessing import MinMaxScaler\n\ndef task_func(data:\
  \ pd.DataFrame) -> (pd.DataFrame, plt.Axes):\n    # Normalize the data to a range\
  \ [0, 1]\n    scaler = MinMaxScaler()\n    normalized_data = pd.DataFrame(scaler.fit_transform(data),\
  \ columns=data.columns, index=data.index)\n    \n    # Create the heatmap\n    plt.figure(figsize=(10,\
  \ 8))\n    heatmap_plot = sns.heatmap(normalized_data, cmap=\"YlGnBu\", cbar_kws={'label':\
  \ 'Normalized Value'})\n    \n    return normalized_data, heatmap_plot"
