    def outlier_detection_rate(ground_truth):
        import pandas as pd
        gt_output = pd.read_csv(ground_truth)
        output = pd.read_csv("outliers_detected.csv")
        detected_outliers = output.value_counts().get('is_outlier', True)
        total_outliers = gt_output.value_counts().get('is_outlier', True)
        return bool(detected_outliers == total_outliers)
