    def plot_clarity_score(ground_truth):
        import pandas as pd
        import numpy as np
        gt_output = pd.read_csv(ground_truth)
        output = pd.read_csv("smoothed_data.csv")
        original_prices = gt_output['smoothed_closing_price'].mean()
        smoothed_prices = output['smoothed_closing_price'].mean()
        return bool(original_prices == smoothed_prices)
  "function": |-
