    def mse_for_outlier_replacements(ground_truth):
        import pandas as pd
        import numpy as np
        gt_output = pd.read_csv(ground_truth)
        output = pd.read_csv("smoothed_data.csv")
        original_prices = gt_output['smoothed_closing_price'].values
        adjusted_prices = output['smoothed_closing_price'].values
        return bool(np.mean((original_prices - adjusted_prices)**2) < 0.05)
