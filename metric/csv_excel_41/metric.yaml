    def proportion_missing_values(ground_truth):
        import pandas as pd
        output = pd.read_csv("missing_values_proportion.csv")
        gt_output = pd.read_csv(ground_truth)
        gt_missing_proportion = gt_output['missing_proportion'].sum()
        first_column = gt_output.iloc[:, 1]
        if 'missing_proportion' in output.columns:
            missing_counts = output['missing_proportion'].sum()
        else:
            missing_counts = output.isnull().sum()

        return bool(missing_counts == gt_missing_proportion)
