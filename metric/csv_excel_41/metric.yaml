    def mean_absolute_error_weight_imputation(ground_truth):
        import pandas as pd
        output = pd.read_csv("updated_data.csv")
        gt_output = pd.read_csv(ground_truth)
        actual_weights = gt_output['weight']
        imputed_weights = output['weight']
        mae = (abs(actual_weights - imputed_weights)).mean()
        return bool(mae <= 0.01) 
  "function": |-
    Data Quality Score
  "metric": |-
    Mean Absolute Error for Weight Imputation
  "task_name": |-
