ground_truth: "import pandas as pd\nimport numpy as np\nimport itertools\n\ndef task_func(data_list=[('a',\
  \ 1, 2.1), ('b', 2, 3.2), ('c', 3, 4.3), ('d', 4, 5.4), ('e', 5, 6.5)]):\n    if\
  \ not data_list:\n        return (pd.DataFrame(columns=['Mean Value']),)\n\n   \
  \ # Transpose the list of tuples to get values at each position\n    transposed_data\
  \ = list(itertools.zip_longest(*data_list))\n\n    means = []\n\n    for position\
  \ in transposed_data:\n        # Filter out non-numeric values\n        numeric_values\
  \ = [x for x in position if isinstance(x, (int, float))]\n        # Calculate mean\
  \ or NaN if no numeric values\n        mean_value = np.mean(numeric_values) if numeric_values\
  \ else np.nan\n        means.append(mean_value)\n\n    # Create DataFrame\n    mean_df\
  \ = pd.DataFrame(means, columns=['Mean Value'], index=[f'Position {i}' for i in\
  \ range(len(means))])\n\n    return (mean_df,)"
prompt: 'Calculate the mean of numerical values in each position across tuples in
  a list. Non-numeric values are ignored, and means are computed only from available
  data. That means that missing data in some of the tuples is simply ignored. A DataFrame
  with one column named ''Mean Value'' which contains the mean values for all tuple
  positions. The index is according to this scheme: ''Position i'' where i is the
  current position. If an empty list is passed, then an empty DataFrame is returned.
  >>> data = [(''a'', ''1'', 2.1), (''b'', 21, ''c''), (12, 3, 4.3), ([''d''], 4,
  5.4), (''e'', 5, 6.5)] >>> df = task_func() >>> print(df) Mean Value Position 0
  NaN Position 1 3.0 Position 2 4.3 The function should output with: tuple(mean_df:
  pandas.DataFrame) mean_df: A pandas DataFrame with the mean values of the numerical
  data at each position. You should write self-contained code starting with: ``` import
  pandas as pd import numpy as np import itertools def task_func(data_list=[(''a'',
  1, 2.1), (''b'', 2, 3.2), (''c'', 3, 4.3), (''d'', 4, 5.4), (''e'', 5, 6.5)]): ```'
