ground_truth: "import pandas as pd\nimport os\nimport numpy as np\nimport ast\nimport\
  \ matplotlib.pyplot as plt\n\ndef task_func(directory):\n    # Traverse the directory\
  \ for CSV files\n    csv_files = [f for f in os.listdir(directory) if f.endswith('.csv')]\n\
  \    \n    # Check if there are CSV files present\n    if not csv_files:\n     \
  \   return pd.DataFrame(columns=['email', 'list', 'sum', 'mean', 'median']), None\n\
  \    \n    # Get the CSV file with the longest filename\n    longest_file = max(csv_files,\
  \ key=len)\n    longest_file_path = os.path.join(directory, longest_file)\n    \n\
  \    # Load the email data from the longest CSV file\n    email_data = pd.read_csv(longest_file_path)\n\
  \    \n    # Convert the 'list' column from string representation of list to actual\
  \ lists\n    email_data['list'] = email_data['list'].apply(ast.literal_eval)\n \
  \   \n    # Calculate sum, mean, and median of the list associated with each email\n\
  \    email_data['sum'] = email_data['list'].apply(sum)\n    email_data['mean'] =\
  \ email_data['list'].apply(np.mean)\n    email_data['median'] = email_data['list'].apply(np.median)\n\
  \    \n    # Create a histogram of the median\n    fig, ax = plt.subplots()\n  \
  \  ax.hist(email_data['median'], bins='auto')\n    ax.set_title('Histogram of Median\
  \ Values')\n    ax.set_xlabel('Median')\n    ax.set_ylabel('Frequency')\n    \n\
  \    # Output tuple of DataFrame and histogram\n    return email_data, ax"
prompt: "Traverse a directory for CSV files and get the file with the longest filename.\
  \ From that CSV file, load e-mail data, convert it into a Pandas DataFrame, calculate\
  \ the sum, mean, and median of the list associated with each e-mail, and then draw\
  \ a histogram of the median. The column names of each CSV file are 'email' and 'list'.\
  \ The column 'list' contains a string representation of a list. It should be converted\
  \ before usage. If there are no CSV files in the directory, return an empty DataFrame\
  \ with the expected columns. If there are no CSV files in the directory, return\
  \ None instead of an empty plot.\n\nThe function should output with: \ntuple(email_data:\
  \ pandas.DataFrame, median_histogram: matplotlib.axes._axes.Axes)\nemail_data: DataFrame\
  \ containing the data from the CSV file with the longest filename augmented with\
  \ the columns 'sum', 'mean', and 'median'.\nmedian_histogram: Histogram of the median.\
  \ None if there is no data to plot. \n\nYou should write self-contained code starting\
  \ with:\n```\nimport pandas as pd\nimport os\nimport numpy as np\nimport ast\ndef\
  \ task_func(directory):\n```"
