ground_truth: "import re\nimport matplotlib.pyplot as plt\nfrom nltk.probability import\
  \ FreqDist\n\ndef task_func(example_str, top_n=30):\n    # Remove text inside square\
  \ brackets\n    cleaned_str = re.sub(r'\\[.*?\\]', '', example_str)\n    \n    #\
  \ Split the cleaned string into words\n    words = cleaned_str.split()\n    \n \
  \   # Calculate frequency distribution\n    freq_dist = FreqDist(words)\n    \n\
  \    # Plot the frequency distribution\n    plt.figure(figsize=(12, 6))\n    freq_plot\
  \ = plt.axes()\n    freq_dist.plot(30, cumulative=False)\n    plt.title('Word Frequency\
  \ Distribution')\n    plt.xlabel('Words')\n    plt.ylabel('Frequency')\n    \n \
  \   # Get the most common words\n    common_words = dict(freq_dist.most_common(top_n))\n\
  \    \n    return freq_plot, common_words"
