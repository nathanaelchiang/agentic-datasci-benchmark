    def model_accuracy(ground_truth):
        import math
        from sklearn.metrics import accuracy_score
        import pandas as pd

        output = pd.read_csv("predicted_sales.csv")
        predictions = output.iloc[:, -1].tolist()
        predictions = [math.ceil(prediction) for prediction in predictions]

        gt_output = pd.read_csv(ground_truth)
        gt_predictions = gt_output.iloc[:, -1].tolist()
        gt_predictions = [math.ceil(prediction) for prediction in gt_predictions]

        actual_gt = pd.read_csv("../test_data.csv")
        actual_label = actual_gt['Purchase Quantity (pcs)'].tolist()[:10]
        
        # Assuming ground_truth is a CSV containing actual sales data with a 'Predicted Purchase Quantity (pcs)' column
        # ground_truth_df = pd.read_csv(ground_truth)
        # true_sales = ground_truth_df.iloc[:, -1].tolist()

        gt_acc = accuracy_score(gt_predictions, actual_label)
        output_acc = accuracy_score(predictions, actual_label)

        return output_acc >= gt_acc
  "function": |-
    Model Accuracy
  "metric": |-
    Model Accuracy
  "task_name": |-
    Predictive modeling
  ground_truth: predicted_sales.csv
