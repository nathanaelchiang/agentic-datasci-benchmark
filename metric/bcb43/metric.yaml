ground_truth: "import numpy as np\nimport pandas as pd\nimport seaborn as sns\nimport\
  \ matplotlib.pyplot as plt\nfrom matplotlib.axes import Axes\nfrom typing import\
  \ List, Tuple\n\ndef task_func(df: pd.DataFrame) -> Tuple[pd.DataFrame, List[Axes]]:\n\
  \    # Replace NaN values with the mean of each numeric column\n    df.fillna(df.mean(),\
  \ inplace=True)\n\n    # Calculate statistics\n    stats_df = df.describe()\n\n\
  \    # Create distribution plots\n    dist_plots = []\n    numeric_cols = df.select_dtypes(include=[np.number]).columns\n\
  \n    plt.figure(figsize=(15, 5))\n    for i, col in enumerate(numeric_cols):\n\
  \        plt.subplot(1, len(numeric_cols), i + 1)\n        ax = sns.histplot(df[col],\
  \ bins=10, kde=True)\n        ax.set_title(f'Distribution of {col}')\n        dist_plots.append(ax)\n\
  \n    plt.tight_layout()\n    plt.show()\n\n    return stats_df, dist_plots"
