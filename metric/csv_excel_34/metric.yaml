    def data_quality_score(ground_truth):
        import pandas as pd
        output = pd.read_csv("cleaned_data.csv")
        gt_output = pd.read_csv(ground_truth)
        # Assuming ground_truth is also a DataFrame
        total_records = len(gt_output)
        cleaned_records = len(output)
        return bool(cleaned_records == total_records)
