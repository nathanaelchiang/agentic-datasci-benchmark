ground_truth: "import pandas as pd\nfrom sklearn.model_selection import train_test_split\n\
  from sklearn.linear_model import LogisticRegression\nfrom sklearn.metrics import\
  \ confusion_matrix\nimport numpy as np\nimport matplotlib.pyplot as plt\n\ndef task_func(feature:\
  \ pd.Series, target: pd.Series) -> (np.ndarray, plt.Axes):\n    # Split the data\
  \ into training and testing sets\n    X_train, X_test, y_train, y_test = train_test_split(feature.values.reshape(-1,\
  \ 1), target, test_size=0.2, random_state=42)\n    \n    # Initialize and train\
  \ the logistic regression model\n    model = LogisticRegression()\n    model.fit(X_train,\
  \ y_train)\n    \n    # Make predictions on the test set\n    y_pred = model.predict(X_test)\n\
  \    \n    # Compute the confusion matrix\n    confusion_mtx = confusion_matrix(y_test,\
  \ y_pred)\n    \n    # Plot the confusion matrix\n    fig, ax = plt.subplots()\n\
  \    cax = ax.matshow(confusion_mtx, cmap='Blues')\n    plt.colorbar(cax)\n    ax.set_xlabel('Predicted')\n\
  \    ax.set_ylabel('True')\n    \n    # Annotate the confusion matrix\n    for (i,\
  \ j), val in np.ndenumerate(confusion_mtx):\n        ax.text(j, i, val, ha='center',\
  \ va='center')\n    \n    plt.title('Confusion Matrix')\n    plt.tight_layout()\n\
  \    \n    return confusion_mtx, ax"
prompt: "Train a logistic regression model on one feature and evaluate its performance\
  \ using a confusion matrix plot. The function takes a feature and a target series,\
  \ splits them into training and testing sets, trains the logistic regression model,\
  \ predicts the target for the test set, and plots the confusion matrix. The function\
  \ should output with: tuple(confusion_mtx: np.ndarray, ax: plt.Axes)\nconfusion_mtx:\
  \ The confusion matrix as a NumPy array. \nax: The matplotlib Axes object of the\
  \ confusion matrix plot. \nYou should write self-contained code starting with:\n\
  ```\nimport pandas as pd\nfrom sklearn.model_selection import train_test_split\n\
  from sklearn.linear_model import LogisticRegression\nfrom sklearn.metrics import\
  \ confusion_matrix\nimport numpy as np\nimport matplotlib.pyplot as plt\ndef task_func(feature:\
  \ pd.Series, target: pd.Series) -> (np.ndarray, plt.Axes):\n```"
