ground_truth: "import pandas as pd\nfrom sklearn.decomposition import PCA\nimport\
  \ matplotlib.pyplot as plt\n\ndef task_func(df):\n    if not isinstance(df, pd.DataFrame):\n\
  \        raise ValueError(\"Input must be a DataFrame.\")\n    if df.empty:\n  \
  \      raise ValueError(\"DataFrame is empty.\")\n    \n    pca = PCA(n_components=2)\n\
  \    principal_components = pca.fit_transform(df)\n    \n    pca_df = pd.DataFrame(data=principal_components,\
  \ columns=['Principal Component 1', 'Principal Component 2'])\n    \n    scatter_ax\
  \ = plt.figure().add_subplot(111)\n    scatter_ax.scatter(pca_df['Principal Component\
  \ 1'], pca_df['Principal Component 2'])\n    scatter_ax.set_title('2 Component PCA')\n\
  \    scatter_ax.set_xlabel('Principal Component 1')\n    scatter_ax.set_ylabel('Principal\
  \ Component 2')\n    plt.show()\n    \n    return pca_df, scatter_ax"
prompt: "Perform Principal Component Analysis (PCA) on the dataframe and visualize\
  \ the two main components. The function should raise the exception for: ValueError:\
  \ If the input is not a DataFrame, or if the DataFrame is empty. The function should\
  \ output with: tuple(pca_df: pandas.DataFrame, scatter_ax: matplotlib.axes.Axes)\n\
  pca_df: A pandas DataFrame with the principal components named 'Principal Component\
  \ 1' and 'Principal Component 2'.  \nscatter_ax: A Matplotlib Axes object representing\
  \ the scatter plot of the two principal components. The plot includes:  \n- Title:\
  \ '2 Component PCA'  \n- X-axis label: 'Principal Component 1'  \n- Y-axis label:\
  \ 'Principal Component 2'  \nYou should write self-contained code starting with:\
  \  \n```\nimport pandas as pd\nfrom sklearn.decomposition import PCA\nimport matplotlib.pyplot\
  \ as plt\ndef task_func(df):\n```  "
