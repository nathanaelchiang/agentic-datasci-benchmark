    def strong_stock_accuracy(ground_truth):
        import pandas as pd
        from sklearn.metrics import accuracy_score
        gt_output = pd.read_csv(ground_truth)
        output = pd.read_csv('strong_stocks_by_industry_count.csv')
        strong_stocks = output['count'].tolist()
        gt_stocks = gt_output['count'].tolist()
        return bool(accuracy_score(gt_stocks, strong_stocks) >= 0.9)
  "function": |-
