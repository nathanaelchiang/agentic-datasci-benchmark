    def industry_count_consistency(ground_truth):
        import pandas as pd
        from sklearn.metrics import mean_squared_error
        output = pd.read_csv('all_stocks_by_industry_count.csv')
        gt_output = pd.read_csv(ground_truth)
        gt_counts = gt_output['total_count'].tolist()
        total_counts = output['total_count'].tolist()
        return bool(gt_counts == total_counts)
