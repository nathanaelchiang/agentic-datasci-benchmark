  \   self.df = pd.DataFrame({'Group': ['A', 'B', 'C'], 'Value': [10, 20, 30]})\n\n\
  \    def test_single_group_bar_chart(self):\n        ax = task_func(self.df, 'Group',\
  \ 'Value', 'B')\n        num_bars = len(ax.containers[0])  # Number of bars in the\
  \ plot\n        self.assertEqual(num_bars, 1)  # There should be 1 bar in the plot\
  \ for group 'B'\n        plt.close()\n\n    def test_missing_group(self):\n    \
  \    with self.assertRaises(ValueError):\n            ax = task_func(self.df, 'Group',\
  \ 'Value', 'D')  # Group 'D' does not exist in the DataFrame\n        plt.close()\n\
  \n    def test_correct_labels(self):\n        ax = task_func(self.df, 'Group', 'Value',\
