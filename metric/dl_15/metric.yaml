    def pruning_efficiency(ground_truth):
        # import torch
        # original_weights = torch.load("trained_model.pth")  # Load original model
        # pruned_weights = torch.load("pruned_model.pth")  # Load pruned model
        # return (original_weights != pruned_weights).sum().item()  # Count pruned weights
        import torch

        # Load the state dictionaries of the models
        original_state_dict = torch.load("trained_model.pth")
        pruned_state_dict = torch.load("pruned_model.pth")

        total_weights = 0
        pruned_weights = 0

        for name, original_param in original_state_dict.items():
            # Only consider parameters that are tensors
            if isinstance(original_param, torch.Tensor):
                total_weights += original_param.numel()  # Total number of weights

                # Check if the parameter exists in the pruned model
                if name in pruned_state_dict:
                    pruned_param = pruned_state_dict[name]

                    # Ensure the parameter is a tensor
                    if isinstance(pruned_param, torch.Tensor):
                        # Compare the original and pruned parameters
                        # A weight is considered pruned if it is zero in the pruned model but non-zero in the original
                        pruned_weights += ((original_param != 0) & (pruned_param == 0)).sum().item()
                else:
                    # If the parameter doesn't exist in the pruned model, consider all its weights as pruned
                    pruned_weights += original_param.numel()

        # Calculate pruning ratio (optional)
        pruning_ratio = pruned_weights / total_weights if total_weights > 0 else 0

        return pruning_ratio > 0
