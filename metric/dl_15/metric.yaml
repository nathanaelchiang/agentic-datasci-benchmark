    def l1_norm(ground_truth):
        import pandas as pd
        output = pd.read_csv("l1_norms.csv")
        gt_output = pd.read_csv(ground_truth)
        return abs(output['L1 Norm'].sum() - gt_output['L1 Norm'].sum()) / gt_output['L1 Norm'].sum() <= 0.1  # Sum of L1 norms in the CSV
