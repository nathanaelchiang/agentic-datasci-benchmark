    def code_completeness(ground_truth):
        with open("model_definition.py", "r") as f:
            code_output = f.read()
        with open(ground_truth, "r") as f:
            gt_output = f.read()

        return sum([line in code_output for line in gt_output.splitlines()]) / len(gt_output.splitlines()) > 0.9
