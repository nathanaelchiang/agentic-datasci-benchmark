    def completeness_filled(ground_truth):
        import pandas as pd
        output = pd.read_csv("step1_filled.csv")
        filled_count = output['CustomerID'].notnull().sum()
        pre_output = (filled_count / len(output)) * 100
        gt = pd.read_csv("step1_filled.csv")
        gt_count = gt['CustomerID'].notnull().sum()
        gt_pre_output = (gt_count / len(gt)) * 100
        return bool(pre_output == gt_pre_output)
  "function": |-
