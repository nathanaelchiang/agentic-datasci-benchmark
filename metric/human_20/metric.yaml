    def percentage_outlier_removal(ground_truth):
        import pandas as pd
        output = pd.read_csv("step2_no_outliers.csv")
        original_count = len(pd.read_csv("step1_filled.csv"))
        new_count = len(output)
        pre_output = ((original_count - new_count) / original_count) * 100
        gt = pd.read_csv("step2_no_outliers.csv")
        gt_original_count = len(pd.read_csv("step1_filled.csv"))
        gt_new_count = len(gt)
        gt_pre_output = ((gt_original_count - gt_new_count) / gt_original_count) * 100
        return bool(pre_output == gt_pre_output)
  "function": |-
    Data Quality Score
  "metric": |-
    Percentage of Outlier Removal
