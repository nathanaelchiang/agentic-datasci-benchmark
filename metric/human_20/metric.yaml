    def check_normalization(ground_truth):
        import pandas as pd
        output = pd.read_csv("step3_normalized.csv")
        min_value = output['Amount'].min()
        max_value = output['Amount'].max()
        gt = pd.read_csv("step3_normalized.csv")
        gt_min_value = gt['Amount'].min()
        gt_max_value = gt['Amount'].max()
        return bool(min_value == gt_min_value and max_value == gt_max_value) # Expecting min to be 0 and max to be 1
