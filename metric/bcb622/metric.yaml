ground_truth: "import matplotlib.pyplot as plt\nimport numpy as np\nfrom scipy.stats\
  \ import norm\nfrom itertools import chain\n\ndef task_func(L):\n    # Flatten the\
  \ list of lists into a single list of integers\n    flattened_list = list(chain.from_iterable(L))\n\
  \    \n    # Fit a normal distribution to the flattened data\n    mu, std = norm.fit(flattened_list)\n\
  \    \n    # Create the histogram of the flattened data\n    fig, ax = plt.subplots()\n\
  \    ax.hist(flattened_list, bins=30, density=True, alpha=0.6, color='g')\n    \n\
  \    # Plot the PDF of the fitted normal distribution\n    xmin, xmax = ax.get_xlim()\n\
  \    x = np.linspace(xmin, xmax, 100)\n    p = norm.pdf(x, mu, std)\n    ax.plot(x,\
  \ p, 'k', linewidth=2)\n    \n    # Return the axes object and the flattened list\n\
  \    return ax, flattened_list"
