    \u5206\u5E03\uFF0C\u83B7\u53D6\u5747\u503C\u548C\u6807\u51C6\u5DEE\n    mu_pred,\
    \ std_pred = norm.fit(flattened_list_pred)\n    \n    # \u83B7\u53D6\u771F\u5B9E\
    \u6570\u636E\u7684 ax \u548C \u6241\u5E73\u5316\u540E\u7684\u5217\u8868\n    ax,\
    \ flattened_list_true = ground_truth\n    \n    # \u5BF9\u771F\u5B9E\u6570\u636E\
    \u7684\u6241\u5E73\u5316\u540E\u7684\u5217\u8868\u62DF\u5408\u6B63\u6001\u5206\
    \u5E03\uFF0C\u83B7\u53D6\u5747\u503C\u548C\u6807\u51C6\u5DEE\n    mu_true, std_true\
    \ = norm.fit(flattened_list_true)\n    \n    mse_mu = mean_squared_error([mu_true],\
    \ [mu_pred])\n    mse_std = mean_squared_error([std_true], [std_pred])\n    \n\
    \    # \u5B9A\u4E49\u6700\u5927\u53EF\u80FD\u7684MSE\u503C\uFF0C\u8FD9\u91CC\u5047\
