ground_truth: "import os\nimport pandas as pd\nfrom dateutil.parser import parse\n\
  import matplotlib.pyplot as plt\n\nOUTPUT_DIR = './output'\n\ndef task_func(csv_path=os.path.join(OUTPUT_DIR,\
  \ 'data.csv'), date_column='date'):\n    # Ensure output directory exists\n    os.makedirs(OUTPUT_DIR,\
  \ exist_ok=True)\n\n    # Read the CSV file\n    df = pd.read_csv(csv_path)\n\n\
  \    # Convert date strings to datetime objects\n    df[date_column] = pd.to_datetime(df[date_column])\n\
  \n    # Extract years and count occurrences\n    year_distribution = df[date_column].dt.year.value_counts().sort_index()\n\
  \n    # Plot the histogram of year distribution\n    hist_plot = year_distribution.plot(kind='bar',\
  \ figsize=(10, 6), title='Year Distribution', xlabel='Year', ylabel='Count')\n\n\
  \    # Show the plot\n    plt.tight_layout()\n    plt.show()\n\n    return hist_plot,\
  \ year_distribution"
