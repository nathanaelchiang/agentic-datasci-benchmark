ground_truth: "from collections import Counter\nimport matplotlib.pyplot as plt\n\
  import pandas as pd\nimport seaborn as sns\n\ndef task_func(list_of_menuitems):\n\
  \    flattened_items = [item for sublist in list_of_menuitems for item in sublist]\n\
  \    \n    if not flattened_items:\n        return None, flattened_items\n\n   \
  \ item_counts = Counter(flattened_items)\n    items_df = pd.DataFrame(item_counts.items(),\
  \ columns=['Item', 'Frequency'])\n    items_df = items_df.sort_values(by='Frequency',\
  \ ascending=False)\n\n    plt.figure(figsize=(10, 6))\n    ax = sns.barplot(x='Frequency',\
  \ y='Item', data=items_df, palette='viridis')\n    plt.title('Menu Item Frequency')\n\
  \    plt.xlabel('Frequency')\n    plt.ylabel('Menu Item')\n    plt.tight_layout()\n\
  \n    plt.show()\n    \n    return ax, flattened_items"
