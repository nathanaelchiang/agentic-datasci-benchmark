    def association_rule_count(ground_truth):
        import pandas as pd
        output = pd.read_csv("association_rules.csv")
        # Compare the number of generated rules with the expectation from the ground truth
        ground_truth_df = pd.read_csv(ground_truth)
        expected_rule_count = min(len(ground_truth_df), 5)  # We expect at least 5 rules
        generated_rule_count = output.shape[0]
        return generated_rule_count == expected_rule_count
  "function": |-
