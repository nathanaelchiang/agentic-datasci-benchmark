    def data_completeness(ground_truth):
        import pandas as pd
        output = pd.read_csv("cleaned_data.csv")
        pre_output = output.notnull().all().all()  # Returns True if all values in the DataFrame are non-null
        gt = pd.read_csv(ground_truth)
        gt_output = gt.notnull().all().all()
        return bool(pre_output == gt_output) # Returns True if the two DataFrames are equal
  "function": |-
