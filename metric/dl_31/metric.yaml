    def model_performance_accuracy(ground_truth):
        import pandas as pd
        from sklearn.metrics import accuracy_score
        
        gt_df = pd.read_csv(ground_truth)
        gt = gt_df['MAE'].tolist()
        output = pd.read_csv("evaluation_results.csv")
        predictions = output['MAE'].tolist()  # Assuming predictions are in this column
        return bool(gt == predictions)
