    def training_loss_evaluation(ground_truth):
        import pandas as pd
        output = pd.read_csv("training_log.csv")
        losses = output.iloc[:, -1].tolist()
        gt_output = pd.read_csv(ground_truth)
        gt_losses = gt_output.iloc[:, -1].tolist()
        return bool(losses[-1] <= gt_losses[-1]) # Return the final loss value
  "function": |-
    Data Quality Score
