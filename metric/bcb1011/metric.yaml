ground_truth: "import pandas as pd\nimport matplotlib.pyplot as plt\n\ndef task_func(csv_file_path,\
  \ col1_name=\"column1\", col2_name=\"column2\"):\n    # Read data from the CSV file\n\
  \    df = pd.read_csv(csv_file_path)\n    \n    # Group the DataFrame by 'col1_name'\
  \ and calculate the mean of 'col2_name'\n    df_mean = df.groupby(col1_name)[col2_name].mean().reset_index()\n\
  \n    # Create a bar plot\n    ax = df_mean.plot(kind='bar', x=col1_name, y=col2_name,\
  \ legend=False)\n    \n    # Set the title and labels\n    ax.set_title(f'Mean of\
  \ {col2_name} Grouped by {col1_name}')\n    ax.set_xlabel(col1_name)\n    ax.set_ylabel(f'Mean\
  \ of {col2_name}')\n    \n    plt.xticks(rotation=45)\n    plt.tight_layout()\n\
  \    \n    # Return the Axes object and the DataFrame with mean values\n    return\
  \ (ax, df_mean)"
