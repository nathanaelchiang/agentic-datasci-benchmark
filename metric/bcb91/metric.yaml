ground_truth: "from scipy.stats import linregress\nimport matplotlib.pyplot as plt\n\
  import pandas as pd\n\ndef task_func(data, column1, column2):\n    if column1 not\
  \ in data.columns or column2 not in data.columns:\n        raise ValueError(f\"\
  Specified columns '{column1}' or '{column2}' do not exist in the DataFrame.\")\n\
  \    \n    x = data[column1]\n    y = data[column2]\n    \n    slope, intercept,\
  \ r_value, p_value, std_err = linregress(x, y)\n    \n    plt.scatter(x, y, label='Original\
  \ Data')\n    plt.plot(x, slope * x + intercept, color='red', label='Fitted Line')\n\
  \    plt.xlabel(column1)\n    plt.ylabel(column2)\n    plt.title('Linear Regression')\n\
  \    plt.legend()\n    ax = plt.gca()\n    plt.show()\n    \n    return (slope,\
  \ intercept, r_value, p_value, std_err, ax)"
prompt: "Perform a linear regression on two columns of a dataset and record the result.\
