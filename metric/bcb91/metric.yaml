  \ The function should raise the exception for: ValueError: If the specified columns\
  \ do not exist in the DataFrame. The function should output with: tuple(slope: float,\
  \ intercept: float, r_value: float, p_value: float, std_err: float, ax: matplotlib.axes.Axes)\n\
  slope: The slope of the regression line. \nintercept: The y-intercept of the regression\
  \ line. \nr_value: The correlation coefficient of the regression. \np_value: The\
  \ p-value for the hypothesis test. \nstd_err: The standard error of the estimated\
  \ slope. \nax: The matplotlib Axes object containing the plot. You should write\
  \ self-contained code starting with: \n```\nfrom scipy.stats import linregress\n\
  import matplotlib.pyplot as plt\ndef task_func(data, column1, column2):\n```"
