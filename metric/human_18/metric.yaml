    def model_accuracy(ground_truth):
        pre_accuracy = float(open("model_accuracy.txt", "r").read().strip().split(': ')[-1])
        gt_accuracy = float(open(ground_truth, "r").read().strip().split(': ')[-1])
        return pre_accuracy >= gt_accuracy
