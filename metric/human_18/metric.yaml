    def pca_explained_variance(ground_truth):
        import pandas as pd
        from sklearn.decomposition import PCA
        
        output = pd.read_csv("pca_results.csv")
        explained_variance = output['explained_variance_ratio'].tolist()

        output_gt = pd.read_csv(ground_truth)
        explained_variance_gt = output_gt['explained_variance_ratio'].tolist()
        
        # Calculation of explained variance
        return sum(explained_variance) <= sum(explained_variance_gt)
  "function": |-
