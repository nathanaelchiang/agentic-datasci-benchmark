ground_truth: "import collections\nimport matplotlib.pyplot as plt\n\ndef task_func(data):\n\
  \    # Initialize total sales dictionary\n    total_sales = collections.defaultdict(int)\n\
  \n    # Iterate through the list of dictionaries\n    for entry in data:\n     \
  \   for fruit, quantity in entry.items():\n            if quantity < 0:\n      \
  \          raise ValueError(\"Sales quantity must not be negative.\")\n        \
  \    total_sales[fruit] += quantity\n\n    # If total_sales is empty, return (empty\
  \ dict, None)\n    if not total_sales:\n        return (dict(total_sales), None)\n\
  \    \n    # Prepare data for the bar chart\n    fruits = list(total_sales.keys())\n\
  \    sales = list(total_sales.values())\n    colors = ['red', 'yellow', 'green',\
  \ 'blue', 'purple']\n    \n    # Generate bar chart\n    fig, ax = plt.subplots()\n\
  \    bar_container = ax.bar(fruits, sales, color=colors[:len(fruits)])\n    \n \
  \   # Set labels\n    ax.set_ylabel('Total Sales')\n    ax.set_title('Total Fruit\
  \ Sales')\n    ax.set_xticks(range(len(fruits)))\n    ax.set_xticklabels(fruits)\n\
  \n    # Show the plot (comment this out if you don't want to display the chart immediately)\n\
  \    # plt.show()\n\n    return (dict(total_sales), bar_container)"
