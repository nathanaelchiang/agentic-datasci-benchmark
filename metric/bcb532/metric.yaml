ground_truth: "import numpy as np\nfrom collections import Counter\nfrom scipy.stats\
  \ import norm\nimport matplotlib.pyplot as plt\nimport pandas as pd\n\ndef task_func(df,\
  \ bins=4):\n    # Count duplicates\n    duplicates_count = Counter(df['value'])\n\
  \    \n    # Filter to keep only duplicates\n    duplicates_count = {k: v for k,\
  \ v in duplicates_count.items() if v > 1}\n    \n    # Plotting the histogram\n\
  \    histogram_axes = plt.axes()\n    counts, bins, patches = histogram_axes.hist(df['value'],\
  \ bins=bins, color='green', alpha=0.6, edgecolor='black')\n    \n    # Fit a normal\
  \ distribution to the data\n    mu, std = norm.fit(df['value'])\n    \n    # Plot\
  \ the normal distribution curve\n    xmin, xmax = histogram_axes.get_xlim()\n  \
  \  x = np.linspace(xmin, xmax, 100)\n    p = norm.pdf(x, mu, std)\n    \n    histogram_axes.plot(x,\
  \ p * len(df) * (bins[1] - bins[0]), 'k', linewidth=2)\n    \n    # Setting titles\
  \ and labels\n    histogram_axes.set_title(\"Distribution\")\n    histogram_axes.set_xlabel(\"\
  Value\")\n    histogram_axes.set_ylabel(\"Frequency\")\n    \n    plt.show()\n \
  \   \n    return (Counter(duplicates_count), histogram_axes)"
prompt: "Identify and count duplicate values in a DataFrame's 'value' column. This\
  \ function also plots a histogram for all values in the 'value' column and overlays\
  \ a normal distribution curve on the histogram.\nThe function should output with:\
  \ tuple(duplicates_count: Counter, histogram_axes: matplotlib.axes.Axes)  \nduplicates_count:\
  \ A Counter object with the count of each duplicate value.  \nhistogram_axes: A\
  \ matplotlib.axes.Axes object that represents the plot of the histogram with the\
  \ 'value' column data. If applicable, a normal distribution curve fitted to the\
  \ data is overlaid. The histogram's bars are green with 60% opacity, and the normal\
  \ distribution curve is black with a linewidth of 2. The plot is titled \"Distribution\"\
  , with \"Value\" as the x-axis label and \"Frequency\" as the y-axis label.  \n\
  You should write self-contained code starting with:  \n```\nimport numpy as np\n\
  from collections import Counter\nfrom scipy.stats import norm\nimport matplotlib.pyplot\
  \ as plt\ndef task_func(df, bins=4):\n```"
