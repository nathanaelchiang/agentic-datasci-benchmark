ground_truth: "import numpy as np\nimport matplotlib.pyplot as plt\nimport pandas\
  \ as pd\n\n# Constants\nCOLORS = ['r', 'g', 'b']\n\ndef task_func(df, group_col,\
  \ value_col):\n    # Check for non-numeric values in the specified value column\n\
  \    if not pd.api.types.is_numeric_dtype(df[value_col]):\n        raise TypeError(\"\
  The 'Value' column has non-numeric values.\")\n    \n    # Group and summarize data\n\
  \    grouped_data = df.groupby(group_col)[value_col].agg(['mean', 'std', 'count']).reset_index()\n\
  \    \n    # Number of groups\n    num_groups = len(grouped_data)\n    \n    # Create\
  \ bar positions\n    indices = np.arange(num_groups)\n    bar_width = 0.4\n    \n\
  \    # Create bar chart\n    fig, ax = plt.subplots()\n    \n    # Create bars with\
  \ error bars\n    for i in range(num_groups):\n        color = COLORS[i % len(COLORS)]\n\
  \        ax.bar(indices[i], grouped_data['mean'][i], yerr=grouped_data['std'][i],\
  \ \n               width=bar_width, color=color, capsize=5, label=grouped_data[group_col][i])\n\
  \    \n    # Set labels and title\n    ax.set_xlabel(group_col)\n    ax.set_ylabel(value_col)\n\
  \    title = f\"Bar chart of {value_col} by {group_col}\"\n    ax.set_title(title)\n\
  \    \n    # Set x-ticks\n    ax.set_xticks(indices)\n    ax.set_xticklabels(grouped_data[group_col])\n\
  \n    # Show legend\n    ax.legend()\n    \n    plt.tight_layout()\n    return ax,\
  \ title"
