  \         task_func(df_non_numeric, 'Group', 'Value')\n        plt.close()\n\n \
  \   def test_large_numbers(self):\n        # Test with a large range of numbers\n\
  \        df_large_numbers = pd.DataFrame({\n            'Group': ['A'] * 100,\n\
  \            'Value': range(1, 101)\n        })\n        ax, _ = task_func(df_large_numbers,\
