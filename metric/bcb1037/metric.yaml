ground_truth: "import pandas as pd\nfrom sklearn.cluster import KMeans\nimport matplotlib.pyplot\
  \ as plt\n\ndef task_func(s1, s2, n_clusters=3):\n    if not isinstance(s1, pd.Series)\
  \ or not isinstance(s2, pd.Series):\n        raise ValueError(\"s1 and s2 must be\
  \ pandas Series\")\n    if len(s1) != len(s2):\n        raise ValueError(\"s1 and\
  \ s2 must have the same length\")\n    \n    # Combine the series into a DataFrame\n\
  \    data = pd.DataFrame({'s1': s1, 's2': s2})\n    \n    # Perform K-Means clustering\n\
  \    kmeans = KMeans(n_clusters=n_clusters)\n    cluster_labels = kmeans.fit_predict(data)\n\
  \    \n    # Create a scatter plot\n    plt.figure(figsize=(8, 6))\n    for i in\
  \ range(n_clusters):\n        plt.scatter(data[cluster_labels == i]['s1'], data[cluster_labels\
  \ == i]['s2'], label=f'Cluster {i}')\n    \n    plt.title('K-Means Clustering')\n\
  \    plt.xlabel('s1')\n    plt.ylabel('s2')\n    plt.legend()\n    plt.grid(True)\n\
  \    ax = plt.gca()\n    \n    plt.show()\n    \n    return (cluster_labels, ax)"
