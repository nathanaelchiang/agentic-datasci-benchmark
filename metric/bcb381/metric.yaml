  import seaborn as sns\nimport matplotlib.pyplot as plt\nimport os\nimport numpy\
  \ as np\n\ndef task_func(file_path='arena.csv', target_column='Index', seed=42):\n\
  \    if not os.path.isfile(file_path):\n        raise FileNotFoundError(f\"The file\
  \ at {file_path} does not exist.\")\n    \n    df = pd.read_csv(file_path)\n   \
  \ \n    if target_column not in df.columns:\n        raise ValueError(f\"The target\
  \ column '{target_column}' is not found in the CSV file.\")\n    \n    df = df.dropna()\n\
  \    \n    if df.isin([float('inf'), -float('inf')]).any().any():\n        raise\
  \ ValueError(\"The input data contains infinity values.\")\n    \n    if (df.select_dtypes(include=['float64',\
  \ 'int64']) > np.finfo(np.float32).max).any().any():\n        raise ValueError(\"\
  A value too large for dtype('float32') is present in the input data.\")\n    \n\
  \    X = df.drop(columns=[target_column])\n    y = df[target_column]\n    \n   \
  \ model = RandomForestClassifier(random_state=seed)\n    model.fit(X, y)\n    \n\
  \    importances = model.feature_importances_\n    \n    plt.figure(figsize=(10,\
  \ 6))\n    sns.barplot(x=importances, y=X.columns)\n    plt.title('Feature Importances')\n\
  \    plt.xlabel('Importance')\n    plt.ylabel('Features')\n    plt.show()\n    \n\
  \    ax = plt.gca()\n    \n    return ax, importances"
