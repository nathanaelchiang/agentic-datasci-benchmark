    def multinomial_model_accuracy(ground_truth):
        from sklearn.metrics import accuracy_score
        import pandas as pd
        output = pd.read_csv("multinomial_model_accuracy.csv")
        gt_output = pd.read_csv(ground_truth)
        gt_acc = gt_output['Accuracy'].values[0]
        predictions = output['Accuracy'].tolist()  # Assuming 'Accuracy' is the column in the output file
        # return accuracy_score(ground_truth, predictions)
        return bool((sum(predictions)/len(predictions)) >= gt_acc)
