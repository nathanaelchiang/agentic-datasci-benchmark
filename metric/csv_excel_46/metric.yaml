"prompt": |-
  Using the dataset of house prices and economic indicators provided below, please complete the following subtasks. Each subtask should generate an output file for evaluation, with specific input files where applicable.

  Dataset: `data.csv`
   
  Subtasks:

  1. Gaussian Naive Bayes Training: Train a Gaussian Naive Bayes model on the cleaned dataset and evaluate its accuracy.  
     Input: `data.csv`  
     Output: `gaussian_model_accuracy.csv` (contains accuracy metrics)

  2. Multinomial Naive Bayes Training: Train a Multinomial Naive Bayes model on the cleaned dataset and evaluate its accuracy.  
     Input: `data.csv`  
     Output: `multinomial_model_accuracy.csv` (contains accuracy metrics)

  3. Comparison of Models: Generate a comparative analysis of the accuracy of both models in a visual format.  
     Input: `gaussian_model_accuracy.csv`, `multinomial_model_accuracy.csv`  
     Output: `model_comparison.png` 

  Please ensure that the outputs contain necessary details for further evaluation.
