  \ zscore\nimport matplotlib.pyplot as plt\n\ndef task_func(data_matrix):\n    #\
  \ Calculate Z-scores for the data matrix\n    z_scores = zscore(data_matrix, axis=1)\n\
  \    z_scores_df = pd.DataFrame(z_scores, columns=[f'Feature {i+1}' for i in range(z_scores.shape[1])])\n\
  \    \n    # Calculate mean of Z-scores for each row\n    z_scores_df['Mean'] =\
  \ z_scores_df.mean(axis=1)\n    \n    # Visualize the correlation matrix with a\
  \ heatmap\n    correlation_matrix = z_scores_df.corr()\n    plt.figure(figsize=(10,\
  \ 8))\n    heatmap_ax = sns.heatmap(correlation_matrix, annot=True, cmap='coolwarm',\
  \ fmt=\".2f\", square=True, linewidths=.5)\n    plt.title('Correlation Matrix of\
  \ Z-scores')\n    \n    return (z_scores_df, heatmap_ax)"
