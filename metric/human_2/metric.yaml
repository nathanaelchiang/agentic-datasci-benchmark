        output = pd.read_csv("cleaned_campaign_data.csv")
        output_gt = pd.read_csv(ground_truth)
        # Checking if the number of rows matches the ground truth (total campaigns) and no NaN values
        return output.shape[0] == output_gt.shape[0] and output.isnull().sum().sum() == 0
