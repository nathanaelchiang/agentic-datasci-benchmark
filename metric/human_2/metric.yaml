    def model_performance_r_squared(ground_truth):
        import pandas as pd
        from sklearn.metrics import r2_score
        output = pd.read_csv("model_parameters.csv")
        output_gt = pd.read_csv(ground_truth)
        
        # Read cleaned campaign data for actual units sold
        cleaned_data = pd.read_csv("cleaned_campaign_data.csv")
        X = cleaned_data[['Marketing expenditure']]
        y = cleaned_data['Units sold']
        
        # Retrieving model coefficients
        coefficients = output.iloc[0].tolist()  # Assuming only one row in parameters file
        model_predictions = X * coefficients[0]  # Assuming single feature linear regression

        coefficients_gt = output_gt.iloc[0].tolist()  # Assuming only one row in parameters file
        model_predictions_gt = X * coefficients_gt[0]  # Assuming single feature linear regression
        
        return bool(r2_score(y, model_predictions) >= r2_score(y, model_predictions_gt))
  "function": |-
    R-squared Value
