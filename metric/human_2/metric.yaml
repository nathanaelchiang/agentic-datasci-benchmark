    def expenditure_accuracy(ground_truth):
        with open("required_expenditure.txt", "r") as file:
            predicted_expenditure = float(file.readline().strip())
        with open(ground_truth, "r") as file:
            predicted_expenditure_gt = float(file.readline().strip())
        
        return predicted_expenditure_gt == predicted_expenditure
