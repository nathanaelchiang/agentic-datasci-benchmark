ground_truth: "from scipy.spatial.distance import cdist\nfrom sklearn.datasets import\
  \ make_blobs\nimport matplotlib.pyplot as plt\n\ndef task_func(n_samples=200, centers=4,\
  \ plot_path=None, random_seed=None):\n    # Generate synthetic dataset\n    X, y\
  \ = make_blobs(n_samples=n_samples, centers=centers, random_state=random_seed)\n\
  \    \n    # Calculate pairwise Euclidean distances\n    distances = cdist(X, X,\
  \ metric='euclidean')\n\n    # Create a scatter plot\n    plt.figure(figsize=(10,\
  \ 6))\n    scatter = plt.scatter(X[:, 0], X[:, 1], c=y, cmap='viridis', marker='o')\n\
  \    plt.title('Synthetic 2D Dataset')\n    plt.xlabel('Feature 1')\n    plt.ylabel('Feature\
  \ 2')\n    plt.colorbar(scatter, label='Cluster Label')\n\n    # Save or show the\
  \ plot\n    if plot_path is None:\n        ax = plt.gca()\n        plt.grid(True)\n\
  \        plt.show()\n        return distances, ax\n    else:\n        plt.savefig(plot_path)\n\
  \        plt.close()\n        return distances, None"
