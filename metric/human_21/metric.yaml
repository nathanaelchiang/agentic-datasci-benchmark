    def encoding_accuracy_diagnosis(ground_truth):
        import pandas as pd
        output = pd.read_csv("diagnosis_encoded.csv")
        gt = pd.read_csv(ground_truth)
        return bool((output['Diagnosis'].values == gt['Diagnosis'].values).all())
