    def missing_value_imputation_accuracy(ground_truth):
        import pandas as pd
        output = pd.read_csv("missing_values_handled.csv")
        gt = pd.read_csv(ground_truth)
        # Compare the cleaned 'Age', 'BloodPressure', and 'Cholesterol' with the ground truth
        missing_value_accuracy = bool(output[['Age', 'BloodPressure', 'Cholesterol']].equals(gt[['Age', 'BloodPressure', 'Cholesterol']]))
        return missing_value_accuracy
