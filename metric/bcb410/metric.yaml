  \ task_func(excel_directory: str, file_name: str, column_name: str, start_date:\
  \ str, end_date: str) -> pd.DataFrame:\n    # Check if the file exists\n    file_path\
  \ = os.path.join(excel_directory, file_name)\n    if not os.path.isfile(file_path):\n\
  \        raise FileNotFoundError(f\"The file {file_name} does not exist in the directory\
  \ {excel_directory}.\")\n\n    # Load the Excel file into a DataFrame\n    df =\
  \ pd.read_excel(file_path)\n\n    # Validate the date format\n    try:\n       \
  \ start_date = datetime.strptime(start_date, \"%Y-%m-%d\")\n        end_date = datetime.strptime(end_date,\
  \ \"%Y-%m-%d\")\n    except ValueError:\n        raise ValueError(\"start_date and\
  \ end_date must be in the format 'YYYY-MM-DD'.\")\n\n    # Check if the specified\
  \ column exists in the DataFrame\n    if column_name not in df.columns:\n      \
  \  raise ValueError(f\"The column '{column_name}' does not exist in the DataFrame.\"\
  )\n\n    # Convert the column to datetime\n    df[column_name] = pd.to_datetime(df[column_name],\
  \ errors='coerce')\n\n    # Filter the DataFrame based on date range\n    filtered_data\
  \ = df[(df[column_name] >= start_date) & (df[column_name] <= end_date)]\n\n    return\
  \ (filtered_data,)"
