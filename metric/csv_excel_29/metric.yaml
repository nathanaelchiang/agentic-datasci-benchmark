    def model_mae(ground_truth):
        from sklearn.metrics import mean_absolute_error
        import pandas as pd
        output = pd.read_csv("predictions.csv")
        gt_output = pd.read_csv(ground_truth)
        predictions = output[output.keys()[-1]].tolist()
        gt_pred = gt_output[gt_output.keys()[-1]].tolist()
        return bool(mean_absolute_error(gt_pred, predictions) < 0.1)
  "function": |-
    Mean Absolute Error
  "metric": |-
    Model Mean Absolute Error (MAE)
  "task_name": |-
    Predictive modeling
  ground_truth: predictions.csv
