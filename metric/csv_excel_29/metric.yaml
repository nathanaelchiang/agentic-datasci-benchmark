    def data_consistency_ratio(ground_truth):
        import pandas as pd
        output = pd.read_csv("cleaned_data.csv")
        gt_output = pd.read_csv(ground_truth)
        cleaned_data = output['Value1'].dropna()
        gt_cleaned = gt_output['Value1'].dropna()
        # consistency_ratio = len(cleaned_data) / len(output)
        return bool(len(cleaned_data) == len(gt_cleaned))
  "function": |-
