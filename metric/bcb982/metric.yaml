ground_truth: "import numpy as np\nimport matplotlib.pyplot as plt\nfrom scipy.stats\
  \ import norm\nimport pandas as pd\n\ndef task_func(df, column, bins=30, density=True,\
  \ alpha=0.6, color=\"g\", seed=None):\n    if seed is not None:\n        np.random.seed(seed)\n\
  \n    data = df[column].dropna()\n    mu, std = norm.fit(data)\n\n    plt.figure(figsize=(10,\
  \ 6))\n    axes = plt.subplot(111)\n\n    # Plot the histogram\n    axes.hist(data,\
  \ bins=bins, density=density, alpha=alpha, color=color, edgecolor='black')\n\n \
  \   # Plot the PDF of the fitted normal distribution\n    xmin, xmax = axes.get_xlim()\n\
  \    x = np.linspace(xmin, xmax, 100)\n    p = norm.pdf(x, mu, std)\n    axes.plot(x,\
  \ p, 'k', linewidth=2, color='blue')\n\n    # Set labels and title\n    axes.set_title(f'Histogram\
  \ of {column} with Fitted Normal Distribution')\n    axes.set_xlabel(column)\n \
  \   axes.set_ylabel('Density' if density else 'Count')\n\n    plt.show()\n    return\
  \ axes, mu, std"
