ground_truth: "from scipy import stats\nimport matplotlib.pyplot as plt\n\ndef task_func(data_dict,\
  \ data_keys):\n    # Extracting the data series from the dictionary\n    x = data_dict[data_keys[0]]\n\
  \    y = data_dict[data_keys[1]]\n    \n    # Calculating the correlation coefficient\n\
  \    correlation_coefficient, _ = stats.pearsonr(x, y)\n    \n    # Creating the\
  \ scatter plot\n    fig, ax = plt.subplots()\n    ax.scatter(x, y)\n    ax.set_xlabel(data_keys[0])\n\
  \    ax.set_ylabel(data_keys[1])\n    ax.set_title(f'Scatter Plot (Correlation:\
  \ {correlation_coefficient:.2f})')\n    \n    # Display the plot\n    plt.show()\n\
  \    \n    return (correlation_coefficient, ax)"
