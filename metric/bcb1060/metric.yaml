  \ not in df.columns or df[column_name].isnull().all():\n        plt.figure()\n \
  \       plt.title(f\"Distribution of values in {column_name} (No Data)\")\n    \
  \    histogram_axes = plt.gca()\n        histogram_axes.set_xticks([])  # Remove\
  \ x-ticks\n        histogram_axes.set_yticks([])  # Remove y-ticks\n        return\
  \ \"The DataFrame is empty or the specified column has no data.\", histogram_axes\n\
  \    \n    # Calculate distribution\n    value_counts = df[column_name].value_counts()\n\
  \    unique_values = len(value_counts)\n    \n    # Check uniformity\n    is_uniform\
  \ = all(count == value_counts.iloc[0] for count in value_counts)\n    distribution_message\
