    def clustering_validity(ground_truth):
        import pandas as pd
        clustering_results = pd.read_csv("clustering_results.csv")
        pre_len = len(clustering_results.iloc[:, -1].unique())
        gt_clustering_results = pd.read_csv(ground_truth)
        gt_len = len(gt_clustering_results.iloc[:, -1].unique())
        # Check if the output has certain expected properties, such as number of clusters
        return bool(pre_len == gt_len)
  "function": |-
    Clustering Validity
