    def data_cleaning_accuracy(ground_truth):
        import pandas as pd
        cleaned_data = pd.read_csv("cleaned_data.csv")
        gt_cleaned_data = pd.read_csv(ground_truth)
        # Assume ground_truth is also a DataFrame for direct comparison.
        return bool(cleaned_data.equals(gt_cleaned_data))
