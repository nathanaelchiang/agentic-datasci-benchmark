    def data_completeness_percentage(ground_truth):
        import pandas as pd
        output = pd.read_excel("cleaned_data.xlsx")
        complete_data_count = output.notnull().sum().sum()  # Count of non-null values
        total_data_count = output.size  # Total number of values
        per = (complete_data_count / total_data_count) * 100
        gt_output = pd.read_excel(ground_truth)
        gt_complete_data_count = gt_output.notnull().sum().sum()  # Count of non-null values
        gt_total_data_count = gt_output.size  # Total number of values
        gt_per = (gt_complete_data_count / gt_total_data_count) * 100
        return bool(per == gt_per)  # Percentage of complete data
  "function": |-
    Data Completeness
  "metric": |-
    Data Completeness Percentage
  "task_name": |-
    Data cleaning and preprocessing
  ground_truth: cleaned_data.xlsx
