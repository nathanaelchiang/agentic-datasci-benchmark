  text2 = "A fast, dark-colored fox leaps over a sleepy canine. 54321"

  args = (text1, text2)'
ground_truth: "import re\nimport numpy as np\nfrom collections import Counter\nfrom\
  \ Levenshtein import ratio\n\n# Constants\nALPHANUMERIC = re.compile('[\\W_]+')\n\
  \ndef clean_text(text):\n    cleaned_text = ALPHANUMERIC.sub(' ', text).lower()\n\
  \    return cleaned_text.strip()\n\ndef cosine_similarity(text1, text2):\n    words1\
  \ = text1.split()\n    words2 = text2.split()\n    \n    vector1 = Counter(words1)\n\
  \    vector2 = Counter(words2)\n    \n    intersection = set(vector1) & set(vector2)\n\
  \    numerator = sum(vector1[word] * vector2[word] for word in intersection)\n \
  \   \n    sum1 = sum(vector1[word] ** 2 for word in vector1)\n    sum2 = sum(vector2[word]\
  \ ** 2 for word in vector2)\n    denominator = np.sqrt(sum1) * np.sqrt(sum2)\n \
  \   \n    if not denominator:\n        return 0.0\n    else:\n        return numerator\
  \ / denominator\n\ndef task_func(text1, text2):\n    cleaned_text1 = clean_text(text1)\n\
  \    cleaned_text2 = clean_text(text2)\n    \n    cosine_sim = cosine_similarity(cleaned_text1,\
  \ cleaned_text2)\n    levenshtein_r = ratio(cleaned_text1, cleaned_text2)\n    \n\
  \    return (cosine_sim, levenshtein_r)"
