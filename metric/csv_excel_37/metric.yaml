    def mean_absolute_error(ground_truth):
        import re

        def extract_scores(file_path):
            with open(file_path, 'r') as file:
                content = file.read()

            # Regular expressions to extract the Mean Squared Error and R^2 Score
            mse_match = re.search(r"Mean Squared Error:\s*([\d.]+)", content)
            r2_match = re.search(r"R\^2 Score:\s*([\d.]+)", content)

            # Extract the values
            mse = float(mse_match.group(1)) if mse_match else None
            r2 = float(r2_match.group(1)) if r2_match else None

            return mse, r2

        # Example usage
        mse, r2 = extract_scores('results/acc.txt')
        gt_mse, gt_r2 = extract_scores(ground_truth)
        return bool(mse <= gt_mse)
