    def encoding_consistency_check(ground_truth):
        import pandas as pd
        output = pd.read_csv("final_cleaned_data.csv")
        unique_product_ids = output['ProductID'].nunique()
        unique_store_ids = output['StoreID'].nunique()
        total_unique_ids = output['ProductID'].unique().size + output['StoreID'].unique().size
        return bool(total_unique_ids == (unique_product_ids + unique_store_ids))  # Check if both encodings do not overlap
