ground_truth: "import numpy as np\nfrom scipy.stats import norm\n\ndef task_func(data:\
  \ np.ndarray, threshold: float = 2.0) -> tuple:\n    mean = np.mean(data)\n    std_dev\
  \ = np.std(data)\n    \n    if std_dev == 0:\n        return [], mean, np.var(data)\n\
  \n    z_scores = (data - mean) / std_dev\n    outliers = np.where(np.abs(z_scores)\
  \ > threshold)[0].tolist()\n    \n    return outliers, mean, np.var(data)"
