    def calculate_mae(ground_truth):
        import pandas as pd
        from sklearn.metrics import mean_absolute_error
        output = pd.read_csv("predicted_prices.csv")
        predictions = output['Predicted Prices'].tolist()
        actual_values = output['Actual Prices'].tolist()
        output_gt = pd.read_csv(ground_truth)
        predictions_gt = output['Predicted Prices'].tolist()
        actual_values_gt = output['Actual Prices'].tolist()
        return mean_absolute_error(actual_values, predictions) <= mean_absolute_error(actual_values_gt, predictions_gt)
  "function": |-
