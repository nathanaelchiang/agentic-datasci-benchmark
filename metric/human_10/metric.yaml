    def data_cleaning_completeness(ground_truth):
        import pandas as pd
        output = pd.read_csv("cleaned_data.csv")
        original_data = pd.read_csv(ground_truth)
        initial_rows = original_data.shape[0]
        cleaned_rows = output.shape[0]
        return cleaned_rows == initial_rows
