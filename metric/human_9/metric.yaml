    def missing_value_ratio(ground_truth):
        import pandas as pd
        output = pd.read_csv("cleaned_data.csv")
        total_cells = output.size
        total_missing = output.isnull().sum().sum()
        output_gd = pd.read_csv(ground_truth)
        total_cells_gd = output_gd.size
        total_missing_gd = output_gd.isnull().sum().sum()
        return total_missing / total_cells == total_missing_gd / total_cells_gd
