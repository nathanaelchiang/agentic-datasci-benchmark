    def clustering_silhouette_score(ground_truth):
        from sklearn.metrics import silhouette_score
        import pandas as pd
        from sklearn.cluster import KMeans
        output = pd.read_csv("clustering_results.csv")
        features = output.iloc[:, :-1].values
        labels = output.iloc[:, -1].values
        output_gd = pd.read_csv(ground_truth)
        features_gd = output_gd.iloc[:, :-1].values
        labels_gd = output_gd.iloc[:, -1].values
        return silhouette_score(features, labels) >= silhouette_score(features_gd, labels_gd)
  "function": |-
    Silhouette Score
  "metric": |-
    Clustering Silhouette Score
