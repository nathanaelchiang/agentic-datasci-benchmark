ground_truth: "import pandas as pd\nimport numpy as np\nimport matplotlib.pyplot as\
  \ plt\n\ndef task_func(file_path=\"data.csv\", columns=[\"A\", \"B\", \"C\"]):\n\
  \    # Read the CSV file into a DataFrame\n    df = pd.read_csv(file_path)\n\n \
  \   # Convert numeric values to floats\n    df[columns] = df[columns].astype(float)\n\
  \n    # Compute the cube-root of the data\n    cube_root = df[columns].apply(np.cbrt)\n\
  \n    # Draw a line chart of the specified columns\n    ax = df[columns].plot.line()\n\
  \n    # Return the required output\n    return (df, ax, cube_root)"
prompt: "Read a CSV file into a Pandas DataFrame, convert numeric values into floats,\
  \ and draw a line chart of data in the specified columns. In addition, compute the\
  \ cube-root of the data. The function should output with: tuple(df: pandas.DataFrame,\
  \ ax: matplotlib.axes.Axes, cube_root: pandas.Series)\ndf: A pandas DataFrame of\
  \ the data in the CSV file. \nax: A matplotlib Axes object showing the plotted data.\
  \ \ncube_root: A pandas Series containing the cube-root of the data. \nYou should\
  \ write self-contained code starting with:\n```\nimport pandas as pd\nimport numpy\
  \ as np\ndef task_func(file_path=\"data.csv\", columns=[\"A\", \"B\", \"C\"]):\n\
  ```"
testcase: "import unittest\nimport tempfile\nimport pandas as pd\nimport matplotlib.pyplot\
