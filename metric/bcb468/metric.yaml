  \ for i, v in subdict.items()} for k, subdict in d.items()}\n\nclass TestCases(unittest.TestCase):\n\
  \    def setUp(self):\n        self.test_dir = tempfile.TemporaryDirectory()\n \
  \       self.temp_files = {}\n        # Data setups for different scenarios\n  \
  \      self.data_sets = {\n            \"int\": pd.DataFrame({\"A\": [1, 2, 3],\
  \ \"B\": [4, 5, 6], \"C\": [7, 8, 9]}),\n            \"varied\": pd.DataFrame(\n\
  \                {\n                    \"IntColumn\": [1, 2, 3],\n            \
  \        \"FloatColumn\": [1.1, 2.2, 3.3],\n                    \"StringColumn\"\
  : [\"4\", \"5\", \"6\"],\n                }\n            ),\n            \"varied_invalid\"\
  : pd.DataFrame(\n                {\n                    \"IntColumn\": [1, 2, 3],\n\
  \                    \"FloatColumn\": [1.1, 2.2, 3.3],\n                    \"StringColumn\"\
  : [\"a\", \"b\", \"c\"],\n                }\n            ),\n        }\n       \
  \ # Write data sets to temporary files\n        for key, df in self.data_sets.items():\n\
  \            temp_file_path = os.path.join(self.test_dir.name, f\"{key}.csv\")\n\
  \            df.to_csv(temp_file_path, index=False, header=True)\n            self.temp_files[key]\
  \ = temp_file_path\n\n    def tearDown(self):\n        self.test_dir.cleanup()\n\
  \        plt.close(\"all\")\n\n    def test_case_1(self):\n        file_path = self.temp_files[\"\
