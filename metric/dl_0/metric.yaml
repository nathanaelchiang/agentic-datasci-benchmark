    def missing_value_percentage(ground_truth):
        import pandas as pd
        output = pd.read_csv("combined_data.csv") 
        total_cells = output.size
        missing_cells = output.isnull().sum().sum()
        gt_output = pd.read_csv(ground_truth) 
        gt_total_cells = gt_output.size
        gt_missing_cells = gt_output.isnull().sum().sum()
        missing = (missing_cells / total_cells) * 100
        gt_missing = (gt_missing_cells / gt_total_cells) * 100
        return bool(missing == gt_missing)
  "function": |-
    Data Completeness
