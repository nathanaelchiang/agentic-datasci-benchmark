    def cluster_quality(ground_truth):
        from sklearn.metrics import silhouette_score
        import pandas as pd
        from sklearn.cluster import KMeans
        output = pd.read_csv("segmented_data.csv", nrows=1000)
        kmeans = KMeans(n_clusters=len(set(output)))
        kmeans.fit(output)
        gt_output = pd.read_csv(ground_truth, nrows=1000)
        gt_kmeans = KMeans(n_clusters=len(set(gt_output)))
        gt_kmeans.fit(gt_output)
        pre = silhouette_score(output, gt_kmeans.labels_)
        gt = silhouette_score(gt_output, gt_kmeans.labels_)
        return bool(pre >= gt)
  "function": |-
    Silhouette Score
  "metric": |-
    Cluster Quality (Silhouette Score)
