ground_truth: "import pandas as pd\nimport seaborn as sns\nimport matplotlib.pyplot\
  \ as plt\nfrom scipy.stats import chi2_contingency\n\ndef task_func(df1, df2, column1=\"\
  feature1\", column2=\"feature2\"):\n    # Merge the two dataframes on the 'id' column\n\
  \    merged_df = pd.merge(df1, df2, on='id')\n\n    # Create a contingency table\n\
  \    contingency_table = pd.crosstab(merged_df[column1], merged_df[column2])\n\n\
  \    # Perform the Chi-Squared independence test\n    chi2, p, _, _ = chi2_contingency(contingency_table)\n\
  \n    # Create a heatmap of the contingency table\n    plt.figure(figsize=(10, 6))\n\
  \    heatmap = sns.heatmap(contingency_table, annot=True, fmt='g', cmap='Blues')\n\
  \    plt.title('Contingency Table Heatmap')\n    plt.xlabel(column2)\n    plt.ylabel(column1)\n\
  \    plt.show()\n\n    return (p, heatmap)"
