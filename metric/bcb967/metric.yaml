ground_truth: "import numpy as np\nfrom scipy import integrate\nimport matplotlib.pyplot\
  \ as plt\n\ndef task_func(func, x_range=(-2, 2), num_points=1000):\n    # Create\
  \ an array of x values\n    x_values = np.linspace(x_range[0], x_range[1], num_points)\n\
  \    # Calculate the function values\n    function_values = func(x_values)\n   \
  \ # Calculate the cumulative integral\n    integral_result = integrate.cumtrapz(function_values,\
  \ x_values, initial=0)\n\n    # Plotting\n    fig, ax = plt.subplots()\n    ax.plot(x_values,\
  \ function_values, label=f'{func.__name__}(x)', color='b')\n    ax.plot(x_values,\
  \ integral_result, label=f'Integral of {func.__name__}(x)', color='r')\n    ax.set_xlabel('x')\n\
  \    ax.set_ylabel('y')\n    ax.legend()\n    plt.title('Function and its Cumulative\
  \ Integral')\n    plt.grid(True)\n\n    return ax, integral_result"
prompt: "Calculates and plots both a given function and its cumulative integral over\
