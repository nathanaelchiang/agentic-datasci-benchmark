    \u53D6\u9884\u6D4B\u503C\u548C\u771F\u5B9E\u503C\n    output=output[0]\n    ground_truth=ground_truth[0]\n\
    \    predicted = output.iloc[:, 1]\n    true_values = ground_truth.iloc[:, 1]\n\
    \    \n    # \u8BA1\u7B97\u603B\u5E73\u65B9\u548C\uFF08Total Sum of Squares, TSS\uFF09\
    \n    mean_true = np.mean(true_values)\n    tss = np.sum((true_values - mean_true)\
    \ ** 2)\n    \n    # \u8BA1\u7B97\u56DE\u5F52\u5E73\u65B9\u548C\uFF08Regression\
    \ Sum of Squares, RSS\uFF09\n    rss = np.sum((predicted - true_values) ** 2)\n\
    \    \n    # \u8BA1\u7B97\u51B3\u5B9A\u7CFB\u6570 R\xB2\n    r_squared = 1 - (rss\
    \ / tss)\n    \n    return r_squared"
